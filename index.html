<!DOCTYPE html>

<div id="intro">

  <video autoplay muted loop playsinline id="bgVideo">
    <source src="https://warnermedia.sharepoint.com/sites/ChileOpsWBD/SiteAssets/VIDEOS/Video%20Anfitrion%20Operaciones.mp4">
  </video>

  <div class="overlay">
    <h1>MT&O Chile</h1>
    <button id="enterBtn">Conócenos</button>
  </div>

</div>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>MT&O Experience</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  color:white;
  font-family:Arial;
}

/* STAGE */
#mtoApp{
  width:100vw;
  height:100vh;
  position:relative;
}

/* GEAR */
#gearWrap{
  position:absolute;
  width:500px;
  height:500px;
  left:50%;
  top:50%;
  transform:translate(-50%, -50%);
}

#gear{
  width:100%;
  height:100%;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png") center/contain no-repeat;
  transform-origin:center;
}

/* SLIDES */
.slide{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  transition:.6s;
}

.slide.active{
  opacity:1;
}

  #intro{
  position:fixed;
  inset:0;
  z-index:999;
}

#bgVideo{
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.5);
}

#enterBtn{
  padding:12px 30px;
  border:1px solid white;
  background:transparent;
  color:white;
  cursor:pointer;
}

</style>
</head>

<body>

<div id="mtoApp">

<div id="gearWrap">
  <div id="gear"></div>
</div>

<div class="slide active"><h1>NUESTRAS ÁREAS</h1></div>
<div class="slide"><h1>ESTUDIOS & OUTDOOR</h1></div>
<div class="slide"><h1>MOC</h1></div>
<div class="slide"><h1>BOC</h1></div>
<div class="slide"><h1>GESTIÓN</h1></div>
<div class="slide"><h1>GFX</h1></div>

</div>

<script>

/* ROTACIÓN + SCROLL */
let rotation = 0;
let currentSlide = 0;
const slides = document.querySelectorAll(".slide");

window.addEventListener("wheel", (e)=>{

  rotation += e.deltaY * 0.2;

  document.getElementById("gear").style.transform =
    "rotate("+rotation+"deg)";

  if(e.deltaY > 0){
    currentSlide++;
  }else{
    currentSlide--;
  }

  currentSlide = Math.max(0, Math.min(currentSlide, slides.length-1));

  slides.forEach(s=>s.classList.remove("active"));
  slides[currentSlide].classList.add("active");

});

  document.getElementById("enterBtn").addEventListener("click", ()=>{

  const intro = document.getElementById("intro");

  intro.style.opacity = "0";
  intro.style.transition = "opacity 1s";

  setTimeout(()=>{
    intro.style.display = "none";
  }, 1000);

});

</script>

</body>
</html>
