<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT&O Experience PRO</title>

<style>

/* ===== BASE ===== */
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:black;
}

/* ===== FLIP ===== */
.mto-flip{
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:1s;
}
.mto-flip.flipped{ transform:rotateY(180deg); }

.mto-front,.mto-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
}
.mto-back{ transform:rotateY(180deg); }

/* ===== VIDEO ===== */
video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== OVERLAY ===== */
.mto-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.55);
  color:white;
}

/* ===== BOTÓN PRO 🔥 ===== */
.mto-cta{
  margin-top:25px;
  padding:14px 34px;
  border-radius:40px;

  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.4);

  color:white;
  font-size:14px;
  letter-spacing:1px;

  cursor:pointer;
  backdrop-filter:blur(8px);

  transition:all .35s cubic-bezier(.22,1,.36,1);

  box-shadow:
    0 0 0 rgba(0,200,255,0),
    inset 0 0 0 rgba(255,255,255,0);
}

/* HOVER */
.mto-cta:hover{
  background:rgba(0,200,255,0.15);
  border:1px solid rgba(0,200,255,0.6);

  transform:translateY(-2px) scale(1.05);

  box-shadow:
    0 0 20px rgba(0,200,255,.4),
    inset 0 0 10px rgba(255,255,255,.2);
}

/* CLICK */
.mto-cta:active{
  transform:scale(0.97);
}

/* ===== BACK ===== */
.mto-back{ background:#000; }

/* ===== ENGRANAJE ===== */
#gearWrap{
  position:fixed;
  width:520px;
  height:520px;
  left:-120px;
  top:50%;
  transform:translateY(-50%);
  z-index:50;
}

#gear{
  width:100%;
  height:100%;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png?csf=1&web=1&e=uamKCV") center/contain no-repeat;
}

/* ===== CORE ===== */
.gear-core{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:190px;
  height:190px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;

  box-shadow:
    inset 0 8px 20px rgba(255,255,255,.6),
    inset 0 -15px 30px rgba(0,0,0,.9),
    0 0 40px rgba(0,200,255,.15);
}

.gear-core-metal{
  position:absolute;
  inset:0;
  border-radius:50%;
  background:
    radial-gradient(circle at 30% 30%, #fff, #bbb 30%, #555 60%, #111);
}

.gear-logo{
  position:absolute;
  width:95px;
  height:95px;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
  filter:brightness(0) invert(1) drop-shadow(0 0 6px rgba(0,200,255,.6));
}

/* ===== SLIDES ===== */
#slides{
  position:absolute;
  width:100%;
  height:100%;
  transition:transform 1.2s cubic-bezier(.22,1,.36,1);
}

.slide{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* ===== FONDOS ===== */
.slide:nth-child(1){ background:#0f2f44;}
.slide:nth-child(2){ background:#1b3f7a;}
.slide:nth-child(3){ background:#3b1d5a;}
.slide:nth-child(4){ background:#1c4a36;}
.slide:nth-child(5){ background:#5a1d1d;}
.slide:nth-child(6){ background:#7a3b10;}

/* ===== TITULOS ===== */
h1{
  font-size:3.5rem;
  color:#fff;
}

/* ===== SUBAREAS ===== */
.subareas{
  margin-top:40px;
  display:flex;
  gap:40px;
  flex-wrap:wrap;
  justify-content:center;
}

/* burbujas */
.bubble{
  width:160px;
  height:160px;
  border-radius:50%;
  overflow:hidden;
  position:relative;

  background-size:cover;
  background-position:center;

  box-shadow:0 20px 40px rgba(0,0,0,.5);

  transition:.3s;
  cursor:pointer;
}

.bubble:hover{
  transform:scale(1.1);
}

/* overlay */
.bubble::after{
  content:attr(data-name);
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.5);
  color:white;
  opacity:0;
  transition:.3s;
}

.bubble:hover::after{
  opacity:1;
}

/* ===== PANEL ===== */
#panel{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  opacity:0;
  pointer-events:none;
  transition:.5s;
  z-index:999;
}

#panel.active{
  opacity:1;
  pointer-events:auto;
}

.panel-img{
  flex:1;
  background-size:cover;
  background-position:center;
}

.panel-content{
  flex:1;
  padding:60px;
  color:white;
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  cursor:pointer;
}

  /* ===== ENERGÍA BOTÓN ===== */

.energy-burst{
  position:absolute;
  width:20px;
  height:20px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(0,200,255,.9), transparent 70%);
  opacity:0;
  transform:scale(0);
  pointer-events:none;
}

/* expansión */
.energy-burst.active{
  animation:burst 0.8s ease-out forwards;
}

@keyframes burst{
  0%{
    opacity:1;
    transform:scale(0);
  }
  70%{
    opacity:.6;
    transform:scale(25);
  }
  100%{
    opacity:0;
    transform:scale(40);
  }
}

/* glow botón activo */
.mto-cta.active{
  box-shadow:
    0 0 40px rgba(0,200,255,.9),
    0 0 80px rgba(0,200,255,.6);
}

/* ===== ACTIVACIÓN ENGRANAJE ===== */
.gear-activate{
  animation:gearKick 0.6s ease-out;
}

@keyframes gearKick{
  0%{ transform:scale(0.9) rotate(0deg); }
  50%{ transform:scale(1.05) rotate(20deg); }
  100%{ transform:scale(1) rotate(0deg); }
}

/* glow centro */
.gear-core.active{
  box-shadow:
    inset 0 8px 20px rgba(255,255,255,.8),
    inset 0 -15px 30px rgba(0,0,0,1),
    0 0 60px rgba(0,200,255,.6);
}

</style>
</head>

<body>

<div class="mto-flip" id="flip">

<!-- FRONT -->
<div class="mto-front">
<video autoplay muted loop>
<source src="https://warnermedia.sharepoint.com/sites/ChileOpsWBD/SiteAssets/VIDEOS/Video%20Anfitrion%20Operaciones.mp4">
</video>

<div class="mto-overlay">
<h1>BIENVENIDOS A OPERACIONES</h1>
<button class="mto-cta" onclick="enter()">Conócenos</button>
<div class="energy-burst" id="energyBurst"></div>
</div>
</div>

<!-- BACK -->
<div class="mto-back">

<div id="gearWrap">
  <div id="gear"></div>
  <div class="gear-core">
    <div class="gear-core-metal"></div>
    <div class="gear-logo"></div>
  </div>
</div>

<div id="slides">

<section class="slide">
<h1>NUESTRAS ÁREAS</h1>
</section>

<section class="slide">
<h1>ESTUDIOS & OUTDOOR</h1>
<div class="subareas">

<div class="bubble" data-name="Cámara" data-img="https://images.unsplash.com/photo-1492724441997-5dc865305da7"></div>
<div class="bubble" data-name="Iluminación" data-img="https://images.unsplash.com/photo-1504384308090-c894fdcc538d"></div>
<div class="bubble" data-name="Audio" data-img="https://images.unsplash.com/photo-1511379938547-c1f69419868d"></div>

</div>
</section>

</div>

</div>
</div>

<!-- PANEL -->
<div id="panel">
  <div class="panel-img"></div>
  <div class="panel-content">
    <div class="close" onclick="closePanel()">✕</div>
    <h1 id="pTitle"></h1>
  </div>
</div>

<script>

/* FLIP */
function enter(){

  const btn = document.querySelector(".mto-cta");
  const burst = document.getElementById("energyBurst");
  const gear = document.getElementById("gear");
  const core = document.querySelector(".gear-core");

  // activar botón
  btn.classList.add("active");

  // posicionar burst en botón
  const rect = btn.getBoundingClientRect();
  burst.style.left = rect.left + rect.width/2 + "px";
  burst.style.top = rect.top + rect.height/2 + "px";

  burst.classList.add("active");

  // activar engranaje
  setTimeout(()=>{
    gear.classList.add("gear-activate");
    core.classList.add("active");

    velocity += 2.5; // 🔥 impulso inicial real

  },200);

  // flip final
  setTimeout(()=>{
    document.getElementById("flip").classList.add("flipped");
  },900);
}

/* SCROLL */
let current=0;
const slides=document.querySelectorAll(".slide");

function update(){
  document.getElementById("slides").style.transform =
    `translateY(-${current*100}vh)`;
}

/* ENGRANAJE */
let velocity=0,rotation=0;

function animate(){
  rotation+=velocity;
  velocity*=0.94;
  document.getElementById("gear").style.transform=`rotate(${rotation}deg)`;
  requestAnimationFrame(animate);
}
animate();

window.addEventListener("wheel", e=>{
  velocity+=e.deltaY*0.008;

  if(e.deltaY>0) current++;
  else current--;

  current=Math.max(0,Math.min(current,slides.length-1));
  update();
});

/* PANEL */
document.querySelectorAll(".bubble").forEach(b=>{
  b.addEventListener("click", ()=>{
    document.getElementById("panel").classList.add("active");
    document.querySelector(".panel-img").style.backgroundImage =
      `url(${b.dataset.img})`;
    document.getElementById("pTitle").innerText = b.dataset.name;
  });
});

function closePanel(){
  document.getElementById("panel").classList.remove("active");
}

</script>

</body>
</html>
