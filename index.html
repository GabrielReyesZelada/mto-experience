<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT&O Experience</title>

<style>

/* ===== BASE ===== */
body,html{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
background:black;
}

/* ===== STAGE ===== */
#mtoApp{
width:100vw;
height:100vh;
}

.mto-stage{
position:relative;
width:100%;
height:100%;
perspective:1400px;
}

/* ===== FLIP ===== */
.mto-flip{
width:100%;
height:100%;
position:absolute;
transform-style:preserve-3d;
transition:1s;
}
.flipped{ transform:rotateY(180deg); }

.mto-front,.mto-back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
}
.mto-back{ transform:rotateY(180deg); }

/* ===== VIDEO ===== */
video{
width:100%;
height:100%;
object-fit:cover;
}

/* ===== OVERLAY ===== */
.mto-overlay{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.5);
color:white;
text-align:center;
}

.mto-overlay h1{
font-size:2.5rem;
letter-spacing:3px;
}

/* ===== BOTÓN ===== */
.mto-cta{
margin-top:20px;
padding:12px 30px;
border:1px solid white;
border-radius:30px;
cursor:pointer;
background:transparent;
color:white;
}

/* ===== BACK ===== */
.mto-back{
background:#000;
}

/* ===== ENGRANAJE ===== */
#gearWrap{
position:fixed;
left:-120px;
top:50%;
transform:translateY(-50%);
width:520px;
height:520px;
z-index:10;
}

#gear{
width:100%;
height:100%;
background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png?csf=1&web=1&e=uamKCV") center/contain no-repeat;
}

/* centro */
.gear-core{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:180px;
height:180px;
}

.gear-core-metal{
width:100%;
height:100%;
border-radius:50%;
background:radial-gradient(circle,#fff,#888,#111);
}

.gear-logo{
position:absolute;
width:90px;
height:90px;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
}

/* ===== HINT ===== */
.gear-hint{
position:absolute;
bottom:-60px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:14px;
}
.gear-hint::before{ content:"⚙️ "; }

/* ===== SLIDES ===== */
#slides{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
transition:transform 1s ease, opacity 1s ease;
}

.content{
max-width:800px;
color:white;
}

/* fondos */
.slide:nth-child(1){ background:#001a40; }
.slide:nth-child(2){ background:#0d47a1; }
.slide:nth-child(3){ background:#4a148c; }
.slide:nth-child(4){ background:#1b5e20; }
.slide:nth-child(5){ background:#b71c1c; }
.slide:nth-child(6){ background:#e65100; }

/* ===== SUBAREAS ===== */
.subareas{
margin-top:30px;
display:flex;
flex-direction:column;
gap:12px;
}

.sub{
cursor:pointer;
opacity:.7;
transition:.4s;
}

.sub:hover{
opacity:1;
transform:translateX(10px);
color:#00c8ff;
}

/* ===== PANEL LATERAL ===== */
.panel{
position:fixed;
right:-400px;
top:0;
width:400px;
height:100%;
background:#111;
color:white;
padding:30px;
transition:.5s;
z-index:100;
}

.panel.open{
right:0;
}

/* ===== BOTÓN VOLVER ===== */
.back-btn{
position:fixed;
top:20px;
right:20px;
z-index:200;
padding:10px 20px;
border:1px solid white;
background:transparent;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div id="mtoApp">
<div class="mto-stage">
<div class="mto-flip" id="flip">

<!-- FRONT -->
<div class="mto-front">
<video autoplay muted loop playsinline>
<source src="https://warnermedia.sharepoint.com/sites/ChileOpsWBD/SiteAssets/VIDEOS/Video%20Anfitrion%20Operaciones.mp4">
</video>

<div class="mto-overlay">
<h1>BIENVENIDOS A OPERACIONES - CHILE</h1>
<button class="mto-cta" onclick="enter()">Conócenos</button>
</div>
</div>

<!-- BACK -->
<div class="mto-back">

<button class="back-btn" onclick="volver()">Volver</button>

<div id="gearWrap">
<div id="gear"></div>
<div class="gear-core">
<div class="gear-core-metal"></div>
<div class="gear-logo"></div>
</div>
<div class="gear-hint">Usa la rueda del mouse</div>
</div>

<div id="slides">

<section class="slide"><div class="content"><h1>NUESTRAS ÁREAS</h1></div></section>

<section class="slide">
<div class="content">
<h1>ESTUDIOS & OUTDOOR</h1>
<div class="subareas">
<div class="sub" onclick="openPanel('Producción en estudio')">Producción en estudio</div>
<div class="sub" onclick="openPanel('Operaciones en terreno')">Operaciones en terreno</div>
</div>
</div>
</section>

<section class="slide">
<div class="content">
<h1>MOC</h1>
<div class="subareas">
<div class="sub" onclick="openPanel('Ingesta')">Ingesta</div>
<div class="sub" onclick="openPanel('Monitoreo')">Monitoreo</div>
</div>
</div>
</section>

</div>

</div>
</div>
</div>
</div>

<!-- PANEL -->
<div id="panel" class="panel"></div>

<script>

/* FLIP */
function enter(){ flip.classList.add("flipped"); }
function volver(){ flip.classList.remove("flipped"); }

/* SLIDES */
let current=0;
const slides=document.querySelectorAll(".slide");

function updateSlides(){
slides.forEach((s,i)=>{
s.style.transform=`translateY(${(i-current)*100}%)`;
});
}
updateSlides();

/* GEAR FÍSICA */
let velocity=0;
let rotation=0;

function animate(){
rotation+=velocity;
velocity*=0.93;

gear.style.transform=`rotate(${rotation}deg)`;

const glow=Math.abs(velocity)*6;
gear.style.filter=`drop-shadow(0 0 ${glow}px #00c8ff)`;

requestAnimationFrame(animate);
}
animate();

/* SCROLL */
let lock=false;

window.addEventListener("wheel",e=>{
if(lock) return;
lock=true;

if(e.deltaY>0){ current++; velocity+=2; }
else{ current--; velocity-=2; }

current=Math.max(0,Math.min(current,slides.length-1));
updateSlides();

setTimeout(()=>lock=false,500);

},{passive:false});

/* PANEL */
function openPanel(text){
const panel=document.getElementById("panel");
panel.innerHTML="<h2>"+text+"</h2><p>Contenido del área...</p>";
panel.classList.add("open");
}

</script>

</body>
</html>
