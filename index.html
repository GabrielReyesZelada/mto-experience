<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT&O Experience</title>

<style>

/* ===== BASE ===== */
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:black;
}

/* ===== FLIP ===== */
.mto-flip{
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:1.1s cubic-bezier(.22,1,.36,1);
}
.mto-flip.flipped{ transform:rotateY(180deg); }

.mto-front,.mto-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
}
.mto-back{ transform:rotateY(180deg); }

/* ===== VIDEO ===== */
video{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.08);
  transition:2s;
}

/* ===== OVERLAY ===== */
.mto-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.6);
  color:white;
  text-align:center;
}

.mto-overlay h1{
  font-size:2.6rem;
  letter-spacing:4px;
}

/* ===== BOTÓN CINE (RECUPERADO) ===== */
.mto-cta{
  margin-top:30px;
  padding:16px 40px;
  border-radius:40px;
  border:1px solid rgba(255,255,255,.6);
  background:rgba(255,255,255,.05);
  color:white;
  cursor:pointer;
  backdrop-filter:blur(8px);
  transition:.4s;
}

.mto-cta:hover{
  transform:scale(1.1);
  background:white;
  color:black;
  box-shadow:0 0 30px rgba(255,255,255,.7);
}

.mto-cta:active{
  transform:scale(.95);
  box-shadow:0 0 40px rgba(0,200,255,1);
}

/* ===== BACK ===== */
.mto-back{ background:#000; }

/* ===== BOTÓN VOLVER ===== */
.back-btn{
  position:fixed;
  top:20px;
  right:20px;
  z-index:100;
  padding:10px 20px;
  border-radius:20px;
  border:1px solid white;
  background:transparent;
  color:white;
  cursor:pointer;
}

/* ===== ENGRANAJE ===== */
#gearWrap{
  position:fixed;
  width:520px;
  height:520px;
  left:-120px;
  top:50%;
  transform:translateY(-50%);
  z-index:50;
  pointer-events: none;
}

#gear{
  width:100%;
  height:100%;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png?csf=1&web=1&e=uamKCV") center/contain no-repeat;
}

/* ===== CENTRO ===== */
.gear-core{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:180px;
  height:180px;
  border-radius:50%;
  background: radial-gradient(circle,#fff,#bbb,#444,#111);
}

.gear-logo{
  position:absolute;
  width:95px;
  height:95px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
}

/* ===== HINT ===== */
.gear-hint{
  position:absolute;
  bottom:-30px; /* 🔥 antes -60px */
  left:50%;
  transform:translateX(-50%);
  color:white;
  opacity:.8;
  font-size:14px;

  display:flex;
  align-items:center;
  gap:10px;
}

/* ===== SLIDES ===== */

.slide{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  will-change: transform;
}

/* ===== FONDOS ===== */
.slide:nth-child(1){ background:#00c8ff;}
.slide:nth-child(2){ background:#102a54;}
.slide:nth-child(3){ background:#1d1f4d;}
.slide:nth-child(4){ background:#153b2e;}
.slide:nth-child(5){ background:#4a1b1b;}
.slide:nth-child(6){ background:#5a2d0c;}

/* ===== TITULOS ===== */
h1{
  font-size:3.5rem;
  color:white;
}

/* ===== SUBAREAS ===== */
.subareas{
  margin-top:40px;
  display:flex;
  gap:30px;
  flex-wrap:wrap;
  justify-content:center;
}

.bubble{
  width:150px;
  height:150px;
  border-radius:50%;
  position:relative;
  overflow:hidden;
  cursor:pointer;

  transform-style: preserve-3d;
  perspective: 600px;

  background: radial-gradient(circle at 30% 30%, #ffffff22, #000000cc);

  box-shadow:
    inset 0 15px 30px rgba(255,255,255,.25),
    inset 0 -30px 60px rgba(0,0,0,.9),
    0 20px 40px rgba(0,0,0,.8);
}

.bubble-img{
  transform: translateZ(40px) scale(1.2);
  transition: transform .25s ease;
}

.bubble::after{
  content:"";
  position:absolute;
  inset:0;

  background:inherit;
  border-radius:50%;

  filter: blur(12px);
  opacity:.25;

  transform:scale(1.15);
}

.bubble::before{
  content:"";
  position:absolute;
  width:60%;
  height:40%;
  top:10%;
  left:20%;

  border-radius:50%;
  background: radial-gradient(circle, rgba(255,255,255,.9), transparent 70%);

  filter: blur(10px);
  opacity:.8;

  transform: translateZ(50px);
}

.bubble:hover{
  transform: scale(1.08);
  box-shadow:
    inset 0 15px 30px rgba(255,255,255,.5),
    inset 0 -25px 50px rgba(0,0,0,1),
    0 20px 50px rgba(0,0,0,.9);
}

.bubble:hover .bubble-img{
  transform: translate(-10px, -10px) scale(1.2);
}

.bubble-depth{
  position:absolute;
  inset:0;
  border-radius:50%;

  background: radial-gradient(circle at 60% 60%, rgba(255,255,255,.15), transparent 70%);
  
  transform: translateZ(-30px) scale(1.3);
  filter: blur(20px);
  opacity:.5;
}

/* ===== PANEL ===== */
#panel{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  opacity:0;
  pointer-events:none;
  transition:.4s;
  z-index:999;
}

#panel.active{
  opacity:1;
  pointer-events:auto;
}

.panel-img{
  flex:1;
  background-size:cover;
}

.panel-content{
  flex:1;
  padding:60px;
  color:white;
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  cursor:pointer;
}

/* ===== ENERGÍA BOTÓN ===== */

.energy-burst{
  position:absolute;
  width:20px;
  height:20px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(0,200,255,.9), transparent 70%);
  opacity:0;
  transform:scale(0);
  pointer-events:none;
}

/* expansión */
.energy-burst.active{
  animation:burst 0.8s ease-out forwards;
}

@keyframes burst{
  0%{
    opacity:1;
    transform:scale(0);
  }
  70%{
    opacity:.6;
    transform:scale(25);
  }
  100%{
    opacity:0;
    transform:scale(40);
  }
}

/* glow botón activo */
.mto-cta.active{
  box-shadow:
    0 0 40px rgba(0,200,255,.9),
    0 0 80px rgba(0,200,255,.6);
}

/* ===== ACTIVACIÓN ENGRANAJE ===== */
.gear-activate{
  animation:gearKick 0.6s ease-out;
}

@keyframes gearKick{
  0%{ transform:scale(0.9) rotate(0deg); }
  50%{ transform:scale(1.05) rotate(20deg); }
  100%{ transform:scale(1) rotate(0deg); }
}

/* glow centro */
.gear-core.active{
  box-shadow:
    inset 0 8px 20px rgba(255,255,255,.8),
    inset 0 -15px 30px rgba(0,0,0,1),
    0 0 60px rgba(0,200,255,.6);
}

#slides{
  position:absolute;
  width:100%;
  height:100%;
  transition:transform 0.85s cubic-bezier(.22,1,.36,1);
  will-change: transform; /* 🔥 AQUÍ sí va */
}

.bubble::marker{ content:none; } /* evitar bugs raros */

.bubble::before{
  content:"";
  position:absolute;
  width:40%;
  height:40%;
  border-radius:50%;

  background: radial-gradient(circle, rgba(255,255,255,.7), transparent 70%);
  filter: blur(6px);

  top: var(--y, 20%);
  left: var(--x, 20%);

  transform: translate(-50%, -50%);
}

.bubble{
  transform-style: preserve-3d;
  perspective: 800px;
}

.bubble:active{
  transform:scale(0.9);
  box-shadow:
    0 0 40px rgba(0,200,255,1),
    inset 0 0 30px rgba(255,255,255,.4);
}

.mini-gear{
  width:18px;
  height:18px;

  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png?csf=1&web=1&e=uamKCV") center/contain no-repeat;
  opacity:.9;
  will-change: transform;
}

</style>
</head>

<body>

<script>

/* ===== FLIP ===== */
function enter(){

  const btn = document.querySelector(".mto-cta");
  const burst = document.getElementById("energyBurst");
  const gearEl = document.getElementById("gear");
  const core = document.querySelector(".gear-core");

  btn.classList.add("active");

  const rect = btn.getBoundingClientRect();
  burst.style.left = rect.left + rect.width/2 + "px";
  burst.style.top = rect.top + rect.height/2 + "px";

  burst.classList.add("active");

  setTimeout(()=>{
    gearEl.classList.add("gear-activate");
    core.classList.add("active");
    velocity += 2.5;
  },200);

  setTimeout(()=>{
    document.getElementById("flip").classList.add("flipped");
  },900);
}

function volver(){
  document.getElementById("flip").classList.remove("flipped");
}

/* ===== SCROLL SUAVE ===== */

let current = 0;
const slides = document.querySelectorAll(".slide");
let scrollAccumulator = 0;
const SCROLL_THRESHOLD = 80;

function update(){
  document.getElementById("slides").style.transform =
    `translateY(-${current * 100}vh)`;
}

window.addEventListener("wheel", e=>{

  scrollAccumulator += e.deltaY;

  // engranaje
  velocity += e.deltaY * 0.015;

  if(Math.abs(scrollAccumulator) < SCROLL_THRESHOLD) return;

  if(scrollAccumulator > 0){
    current++;
  } else {
    current--;
  }

  scrollAccumulator = 0;

  current = Math.max(0, Math.min(current, slides.length - 1));

  update();

},{ passive:true });

/* ===== MINI ENGRANAJE ===== */
  
let miniRotation = 0;
const miniGear = document.querySelector(".mini-gear");

/* ===== ENGRANAJE ===== */
  
let velocity = 0;
let rotation = 0;

const gear = document.getElementById("gear"); // 🔥 ESTA LÍNEA FALTABA

function animate(){
  rotation += velocity;
  velocity *= 0.95;

  gear.style.transform = `rotate(${rotation}deg)`;

  // mini engranaje (más rápido)
  miniRotation += velocity * 1.5;
  miniGear.style.transform = `rotate(${miniRotation}deg)`;

  requestAnimationFrame(animate);
}

animate();

  
/* ===== PANEL ===== */

document.querySelectorAll(".bubble").forEach(b=>{
  b.onclick=()=>{
    document.getElementById("panel").classList.add("active");
    document.querySelector(".panel-img").style.backgroundImage=b.style.backgroundImage;
    document.getElementById("pTitle").innerText=b.dataset.name;
  }
});

/* ===== GEL REACTIVO AL MOUSE ===== */

const bubbles = document.querySelectorAll(".bubble");

document.querySelectorAll(".bubble").forEach(bubble=>{

  bubble.addEventListener("mousemove", e=>{

    const rect = bubble.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width - 0.5;
    const y = (e.clientY - rect.top) / rect.height - 0.5;

    const img = bubble.querySelector(".bubble-img");
    const depth = bubble.querySelector(".bubble-depth");

    // ROTACIÓN SUAVE (no exagerada)
    bubble.style.transform =
      `rotateX(${ -y * 12 }deg) rotateY(${ x * 12 }deg) scale(1.05)`;

    // PARALLAX REAL (clave del realismo)
    img.style.transform =
      `translate(${x*25}px, ${y*25}px) translateZ(40px) scale(1.25)`;

    depth.style.transform =
      `translate(${x*10}px, ${y*10}px) translateZ(-30px) scale(1.3)`;

  });

  bubble.addEventListener("mouseleave", ()=>{

    bubble.style.transform = "rotateX(0deg) rotateY(0deg) scale(1)";

    bubble.querySelector(".bubble-img").style.transform =
      "translate(0,0) translateZ(40px) scale(1.2)";

    bubble.querySelector(".bubble-depth").style.transform =
      "translate(0,0) translateZ(-30px) scale(1.3)";
  });

});
</script>
