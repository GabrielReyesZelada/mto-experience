<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT&O Experience</title>

<style>

/* ===== BASE ===== */
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:black;
}

/* ===== FLIP ===== */
.mto-flip{
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:1.1s cubic-bezier(.22,1,.36,1);
}
.mto-flip.flipped{ transform:rotateY(180deg); }

.mto-front,.mto-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
}
.mto-back{ transform:rotateY(180deg); }

/* ===== VIDEO ===== */
video{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.08);
  transition:2s;
}

/* ===== OVERLAY ===== */
.mto-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.6);
  color:white;
  text-align:center;
}

.mto-overlay h1{
  font-size:2.6rem;
  letter-spacing:4px;
}

/* ===== BOTÓN CINE (RECUPERADO) ===== */
.mto-cta{
  margin-top:30px;
  padding:16px 40px;
  border-radius:40px;
  border:1px solid rgba(255,255,255,.6);
  background:rgba(255,255,255,.05);
  color:white;
  cursor:pointer;
  backdrop-filter:blur(8px);
  transition:.4s;
}

.mto-cta:hover{
  transform:scale(1.1);
  background:white;
  color:black;
  box-shadow:0 0 30px rgba(255,255,255,.7);
}

.mto-cta:active{
  transform:scale(.95);
  box-shadow:0 0 40px rgba(0,200,255,1);
}

/* ===== BACK ===== */
.mto-back{ background:#000; }

/* ===== BOTÓN VOLVER ===== */
.back-btn{
  position:fixed;
  top:20px;
  right:20px;
  z-index:100;
  padding:10px 20px;
  border-radius:20px;
  border:1px solid white;
  background:transparent;
  color:white;
  cursor:pointer;
}

/* ===== ENGRANAJE ===== */
#gearWrap{
  position:fixed;
  width:520px;
  height:520px;
  left:-120px;
  top:50%;
  transform:translateY(-50%);
  z-index:50;
}

#gear{
  width:100%;
  height:100%;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png?csf=1&web=1&e=uamKCV") center/contain no-repeat;
}

/* ===== CENTRO ===== */
.gear-core{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:180px;
  height:180px;
  border-radius:50%;
  background: radial-gradient(circle,#fff,#bbb,#444,#111);
}

.gear-logo{
  position:absolute;
  width:95px;
  height:95px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
}

/* ===== HINT ===== */
.gear-hint{
  position:absolute;
  bottom:-60px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  opacity:.7;
  font-size:14px;
}

/* ===== SLIDES ===== */
#slides{
  position:absolute;
  width:100%;
  height:100%;
  transition:transform 1s cubic-bezier(.22,1,.36,1);
}

.slide{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* ===== FONDOS ===== */
.slide:nth-child(1){ background:#00c8ff;}
.slide:nth-child(2){ background:#102a54;}
.slide:nth-child(3){ background:#1d1f4d;}
.slide:nth-child(4){ background:#153b2e;}
.slide:nth-child(5){ background:#4a1b1b;}
.slide:nth-child(6){ background:#5a2d0c;}

/* ===== TITULOS ===== */
h1{
  font-size:3.5rem;
  color:white;
}

/* ===== SUBAREAS ===== */
.subareas{
  margin-top:40px;
  display:flex;
  gap:30px;
  flex-wrap:wrap;
  justify-content:center;
}

.bubble{
  width:150px;
  height:150px;
  border-radius:50%;
  background-size:cover;
  background-position:center;
  cursor:pointer;
  transition:.3s;
}

.bubble:hover{
  transform:scale(1.1);
}

/* ===== PANEL ===== */
#panel{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  opacity:0;
  pointer-events:none;
  transition:.4s;
  z-index:999;
}

#panel.active{
  opacity:1;
  pointer-events:auto;
}

.panel-img{
  flex:1;
  background-size:cover;
}

.panel-content{
  flex:1;
  padding:60px;
  color:white;
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="mto-flip" id="flip">

<!-- FRONT -->
<div class="mto-front">
<video id="video" autoplay muted loop>
<source src="https://warnermedia.sharepoint.com/sites/ChileOpsWBD/SiteAssets/VIDEOS/Video%20Anfitrion%20Operaciones.mp4">
</video>

<div class="mto-overlay">
<h1>BIENVENIDOS A OPERACIONES</h1>
<button class="mto-cta" onclick="enter()">Conócenos</button>
</div>
</div>

<!-- BACK -->
<div class="mto-back">

<button class="back-btn" onclick="volver()">Volver</button>

<div id="gearWrap">
  <div id="gear"></div>
  <div class="gear-core"></div>
  <div class="gear-logo"></div>
  <div class="gear-hint">Usa la rueda del mouse</div>
</div>

<div id="slides">

<section class="slide">
<h1>NUESTRAS ÁREAS</h1>
</section>

<section class="slide">
<h1>ESTUDIOS & OUTDOOR</h1>
<div class="subareas">
<div class="bubble" data-name="Cámara" style="background-image:url('https://images.unsplash.com/photo-1492724441997-5dc865305da7')"></div>
<div class="bubble" data-name="Audio" style="background-image:url('https://images.unsplash.com/photo-1511379938547-c1f69419868d')"></div>
</div>
</section>

<section class="slide"><h1>MOC</h1></section>
<section class="slide"><h1>BOC</h1></section>
<section class="slide"><h1>GESTIÓN</h1></section>
<section class="slide"><h1>GFX</h1></section>

</div>

</div>
</div>

<div id="panel">
<div class="panel-img"></div>
<div class="panel-content">
<div class="close" onclick="closePanel()">✕</div>
<h1 id="pTitle"></h1>
</div>
</div>

<script>

/* ===== FLIP ===== */
function enter(){
  velocity=6;
  document.getElementById("video").style.transform="scale(1)";
  setTimeout(()=>{
    document.getElementById("flip").classList.add("flipped");
  },300);
}

function volver(){
  document.getElementById("flip").classList.remove("flipped");
}

/* ===== SCROLL ===== */
let current=0;
const slides=document.querySelectorAll(".slide");

function update(){
  document.getElementById("slides").style.transform=`translateY(-${current*100}vh)`;
}

/* ===== ENGRANAJE ===== */
let velocity=0;
let rotation=0;

function animate(){
  rotation+=velocity;
  velocity*=0.95;
  gear.style.transform=`rotate(${rotation}deg)`;
  requestAnimationFrame(animate);
}
animate();

/* ===== CONTROL ===== */
window.addEventListener("wheel", e=>{
  velocity+=e.deltaY*0.01;

  if(e.deltaY>0) current++;
  else current--;

  current=Math.max(0,Math.min(current,slides.length-1));
  update();
});

/* ===== PANEL ===== */
document.querySelectorAll(".bubble").forEach(b=>{
  b.onclick=()=>{
    document.getElementById("panel").classList.add("active");
    document.querySelector(".panel-img").style.backgroundImage=b.style.backgroundImage;
    document.getElementById("pTitle").innerText=b.dataset.name;
  }
});

function closePanel(){
  document.getElementById("panel").classList.remove("active");
}

</script>

</body>
</html>
