<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT&O Experience</title>

<style>

/* ===== RESET ===== */
body, html{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:black;
}

/* ===== APP ===== */
#mtoApp{
  width:100vw;
  height:100vh;
  overflow:hidden;
}

/* ===== FLIP ===== */
.mto-stage{
  position:relative;
  width:100%;
  height:100%;
  perspective:1200px;
}

.mto-flip{
  position:absolute;
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:1s;
}

.mto-flip.flipped{
  transform:rotateY(180deg);
}

.mto-front,.mto-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
}

.mto-back{
  transform:rotateY(180deg);
}

/* ===== VIDEO ===== */
.mto-front video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== OVERLAY ===== */
.mto-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.5);
  color:white;
  text-align:center;
}

/* ===== TITULOS PRO ===== */
h1{
  font-size:4rem;
  letter-spacing:4px;
  font-weight:800;
  text-transform:uppercase;

  background:linear-gradient(90deg,#00c8ff,#ffffff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  margin-bottom:20px;
}

p{
  font-size:1.2rem;
  opacity:.8;
}

/* ===== LOGO ===== */
.mto-logo{
  width:300px;
  height:120px;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
  margin:20px 0;
}

/* ===== BOTÓN ===== */
.mto-cta{
  padding:12px 28px;
  border:1px solid white;
  border-radius:30px;
  background:transparent;
  color:white;
  cursor:pointer;
}

/* ===== BOTÓN VOLVER ===== */
.back-btn{
  position:fixed;
  top:20px;
  right:20px;
  z-index:60;
  padding:10px 20px;
  border:1px solid white;
  border-radius:20px;
  background:transparent;
  color:white;
  cursor:pointer;
}

/* ===== ENGRANAJE ===== */
#gearWrap{
  position:fixed;
  width:520px;
  height:520px;
  left:-120px;
  top:50%;
  transform:translateY(-50%);
  z-index:50;
}

#gear{
  width:100%;
  height:100%;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png?csf=1&web=1&e=uamKCV") center/contain no-repeat;
}

.gear-core{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:180px;
  height:180px;
}

.gear-core-metal{
  width:100%;
  height:100%;
  border-radius:50%;
  background:radial-gradient(circle,#fff,#ccc 30%,#888 60%,#222 100%);
}

.gear-logo{
  position:absolute;
  width:90px;
  height:90px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
}

/* UX hint */
.gear-hint{
  position:absolute;
  left:50%;
  bottom:-50px;
  transform:translateX(-50%);
  color:white;
}

/* ===== SLIDES ===== */
.slide{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  transform:translateY(100%);
  transition:transform 1s cubic-bezier(0.77,0,0.175,1);
}

.slide.active{
  transform:translateY(0);
}

.slide.prev{
  transform:translateY(-100%);
}

/* ===== TEXTURAS PRO ===== */
.slide:nth-child(1){
  background:radial-gradient(circle,#001a40,#000);
}

.slide:nth-child(2){
  background:repeating-linear-gradient(90deg,#0a192f 0,#0a192f 2px,#000 2px,#000 60px);
}

.slide:nth-child(3){
  background:radial-gradient(circle at 20% 50%,#002f2f,#000);
}

.slide:nth-child(4){
  background:linear-gradient(135deg,#111,#000);
}

.slide:nth-child(5){
  background:radial-gradient(circle,#2a0000,#000);
}

.slide:nth-child(6){
  background:radial-gradient(circle,#332200,#000);
}

/* ===== SUBAREAS ===== */
.subareas{
  margin-top:30px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.sub{
  opacity:0;
  transform:translateY(20px);
  transition:.6s;
}

.slide.active .sub{
  opacity:1;
  transform:translateY(0);
}

</style>
</head>

<body>

<div id="mtoApp">
<div class="mto-stage">
<div class="mto-flip" id="flip">

<!-- FRONT -->
<div class="mto-front">
<video autoplay muted loop playsinline>
<source src="https://warnermedia.sharepoint.com/sites/ChileOpsWBD/SiteAssets/VIDEOS/Video%20Anfitrion%20Operaciones.mp4">
</video>

<div class="mto-overlay">
<h1>MEDIA TECHNOLOGY & OPERATIONS</h1>
<div class="mto-logo"></div>
<button class="mto-cta" onclick="enter()">Conócenos</button>
</div>
</div>

<!-- BACK -->
<div class="mto-back">

<button class="back-btn" onclick="volver()">Volver</button>

<div id="gearWrap">
<div id="gear"></div>
<div class="gear-core">
<div class="gear-core-metal"></div>
<div class="gear-logo"></div>
</div>
<div class="gear-hint">Usa la rueda del mouse</div>
</div>

<div id="slides">

<section class="slide active">
<h1>NUESTRAS ÁREAS</h1>
<p>Equipos que trabajan en sincronía para llevar el fútbol a millones de pantallas</p>
</section>

<section class="slide">
<h1>ESTUDIOS & OUTDOOR</h1>
<div class="subareas">
<div class="sub">Iluminación</div>
<div class="sub">Cámara</div>
<div class="sub">Audio</div>
</div>
</section>

<section class="slide">
<h1>MOC</h1>
<div class="subareas">
<div class="sub">Ingesta</div>
<div class="sub">Archivo</div>
<div class="sub">Replay</div>
</div>
</section>

<section class="slide">
<h1>BOC</h1>
<div class="subareas">
<div class="sub">Broadcast Operations</div>
</div>
</section>

<section class="slide">
<h1>GESTIÓN</h1>
<div class="subareas">
<div class="sub">Gestión</div>
<div class="sub">Pañol</div>
</div>
</section>

<section class="slide">
<h1>GFX</h1>
<div class="subareas">
<div class="sub">Gráfica</div>
</div>
</section>

</div>

</div>
</div>
</div>
</div>

<script>

/* ===== FLIP ===== */
function enter(){
  document.getElementById("flip").classList.add("flipped");
}

function volver(){
  document.getElementById("flip").classList.remove("flipped");
}

/* ===== SLIDES ===== */
let current = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(index){
  slides.forEach((s,i)=>{
    s.classList.remove("active","prev");

    if(i===index){
      s.classList.add("active");
    } else if(i<index){
      s.classList.add("prev");
    }
  });
}

/* ===== ENGRANAJE FÍSICO ===== */
let velocity = 0;
let rotation = 0;

function animate(){
  rotation += velocity;
  velocity *= 0.94;

  document.getElementById("gear").style.transform =
    `rotate(${rotation}deg)`;

  requestAnimationFrame(animate);
}
animate();

/* ===== SCROLL REAL ===== */
let lastScroll = 0;

window.addEventListener("wheel", e=>{

  const force = e.deltaY * 0.02;
  velocity += force;

  if(Math.abs(e.deltaY) > 50){

    if(e.deltaY>0){
      current++;
    }else{
      current--;
    }

    current=Math.max(0,Math.min(current,slides.length-1));
    showSlide(current);
  }

},{passive:true});

</script>

</body>
</html>
