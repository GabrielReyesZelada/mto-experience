<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT&O Experience PRO</title>

<style>

/* ===== BASE ===== */
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:black;
}

/* ===== FLIP ===== */
.mto-flip{
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:1s;
}
.mto-flip.flipped{ transform:rotateY(180deg); }

.mto-front,.mto-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
}
.mto-back{ transform:rotateY(180deg); }

/* ===== VIDEO ===== */
video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== OVERLAY ===== */
.mto-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.55);
  color:white;
}

/* ===== BACK ===== */
.mto-back{ background:#000; }

/* ===== ENGRANAJE ===== */
#gearWrap{
  position:fixed;
  width:520px;
  height:520px;
  left:-120px;
  top:50%;
  transform:translateY(-50%);
  z-index:50;
}

#gear{
  width:100%;
  height:100%;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png") center/contain no-repeat;
}

/* ===== SLIDES ===== */
#slides{
  position:absolute;
  width:100%;
  height:100%;
  transition:transform 1.2s cubic-bezier(.22,1,.36,1);
}

.slide{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* ===== FONDOS ===== */
.slide:nth-child(1){ background:#0f2f44;}
.slide:nth-child(2){ background:#1b3f7a;}
.slide:nth-child(3){ background:#3b1d5a;}
.slide:nth-child(4){ background:#1c4a36;}
.slide:nth-child(5){ background:#5a1d1d;}
.slide:nth-child(6){ background:#7a3b10;}

/* ===== TITULOS ===== */
h1{
  font-size:3.5rem;
  color:#fff;
}

/* ===== SUBAREAS PRO ===== */
.subareas{
  margin-top:40px;
  display:flex;
  gap:40px;
  flex-wrap:wrap;
  justify-content:center;
  perspective:1000px;
}

/* burbuja */
.bubble{
  width:160px;
  height:160px;
  border-radius:50%;
  overflow:hidden;
  position:relative;

  background-size:cover;
  background-position:center;

  box-shadow:0 20px 40px rgba(0,0,0,.5);

  transform-style:preserve-3d;
  transition:.2s;

  cursor:pointer;
}

/* glow */
.bubble::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  box-shadow:0 0 25px rgba(0,200,255,.6);
  opacity:0;
  transition:.3s;
}

.bubble:hover::before{
  opacity:1;
}

/* overlay nombre */
.bubble::after{
  content:attr(data-name);
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.5);
  color:white;
  opacity:0;
  transition:.3s;
}

.bubble:hover::after{
  opacity:1;
}

/* ===== PANEL NETFLIX ===== */
#panel{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  opacity:0;
  pointer-events:none;
  transition:.5s;
  z-index:999;
}

#panel.active{
  opacity:1;
  pointer-events:auto;
}

.panel-img{
  flex:1;
  background-size:cover;
  background-position:center;
}

.panel-content{
  flex:1;
  padding:60px;
  color:white;
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="mto-flip" id="flip">

<div class="mto-front">
<video autoplay muted loop>
<source src="https://warnermedia.sharepoint.com/sites/ChileOpsWBD/SiteAssets/VIDEOS/Video%20Anfitrion%20Operaciones.mp4">
</video>
<div class="mto-overlay">
<h1>BIENVENIDOS A OPERACIONES</h1>
<button onclick="enter()">Conócenos</button>
</div>
</div>

<div class="mto-back">

<div id="gearWrap"><div id="gear"></div></div>

<div id="slides">

<section class="slide"><h1>NUESTRAS ÁREAS</h1></section>

<section class="slide">
<h1>ESTUDIOS & OUTDOOR</h1>
<div class="subareas">

<div class="bubble" data-name="Cámara" data-img="https://images.unsplash.com/photo-1492724441997-5dc865305da7"></div>

<div class="bubble" data-name="Iluminación" data-img="https://images.unsplash.com/photo-1504384308090-c894fdcc538d"></div>

<div class="bubble" data-name="Audio" data-img="https://images.unsplash.com/photo-1511379938547-c1f69419868d"></div>

</div>
</section>

</div>

</div>
</div>

<!-- PANEL -->
<div id="panel">
  <div class="panel-img"></div>
  <div class="panel-content">
    <div class="close" onclick="closePanel()">✕</div>
    <h1 id="pTitle"></h1>
    <p id="pDesc">Contenido del área...</p>
  </div>
</div>

<script>

/* FLIP */
function enter(){
  document.getElementById("flip").classList.add("flipped");
}

/* SCROLL */
let current=0;
const slides=document.querySelectorAll(".slide");

function update(){
  document.getElementById("slides").style.transform =
    `translateY(-${current*100}vh)`;
}

/* ENGRANAJE */
let velocity=0,rotation=0;

function animate(){
  rotation+=velocity;
  velocity*=0.94;
  gear.style.transform=`rotate(${rotation}deg)`;
  requestAnimationFrame(animate);
}
animate();

window.addEventListener("wheel", e=>{
  velocity+=e.deltaY*0.008;

  if(e.deltaY>0) current++;
  else current--;

  current=Math.max(0,Math.min(current,slides.length-1));
  update();
});

/* ===== 3D INTERACTION ===== */
document.querySelectorAll(".bubble").forEach(b=>{

  b.addEventListener("mousemove", e=>{
    const rect=b.getBoundingClientRect();
    const x=e.clientX-rect.left;
    const y=e.clientY-rect.top;

    const rotateY=(x/rect.width-0.5)*20;
    const rotateX=(y/rect.height-0.5)*-20;

    b.style.transform=`rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.1)`;
  });

  b.addEventListener("mouseleave", ()=>{
    b.style.transform="rotateX(0) rotateY(0) scale(1)";
  });

  /* CLICK PANEL */
  b.addEventListener("click", ()=>{
    document.getElementById("panel").classList.add("active");

    document.querySelector(".panel-img").style.backgroundImage =
      `url(${b.dataset.img})`;

    document.getElementById("pTitle").innerText = b.dataset.name;
  });

});

/* CLOSE */
function closePanel(){
  document.getElementById("panel").classList.remove("active");
}

</script>

</body>
</html>
