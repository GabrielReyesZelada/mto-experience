<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT&O Experience</title>

<style>

/* ===== BASE ===== */
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:black;
}

/* ===== FLIP ===== */
.mto-flip{
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:1s;
}
.mto-flip.flipped{ transform:rotateY(180deg); }

.mto-front,.mto-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
}
.mto-back{ transform:rotateY(180deg); }

/* ===== VIDEO ===== */
video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== OVERLAY ===== */
.mto-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.6);
  color:white;
  text-align:center;
}

.mto-overlay h1{
  font-size:2.8rem;
  letter-spacing:4px;
}

/* LOGO */
.mto-logo{
  width:320px;
  height:140px;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
  margin:20px 0;
}

/* BOTÓN */
.mto-cta{
  padding:14px 30px;
  border:1px solid white;
  border-radius:30px;
  background:transparent;
  color:white;
  cursor:pointer;
}
.mto-cta:hover{
  background:white;
  color:black;
}

/* ===== BACK ===== */
.mto-back{ background:#000; }

/* ===== BOTÓN VOLVER ===== */
.back-btn{
  position:fixed;
  top:25px;
  right:25px;
  z-index:100;
  padding:10px 20px;
  border:1px solid white;
  border-radius:20px;
  background:transparent;
  color:white;
  cursor:pointer;
}

/* ===== ENGRANAJE ===== */
#gearWrap{
  position:fixed;
  width:520px;
  height:520px;
  left:-120px;
  top:50%;
  transform:translateY(-50%);
  z-index:50;
}

#gear{
  width:100%;
  height:100%;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png?csf=1&web=1&e=uamKCV") center/contain no-repeat;
}

/* CENTRO */
.gear-core{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:180px;
  height:180px;
}

.gear-core-metal{
  width:100%;
  height:100%;
  border-radius:50%;
  background: radial-gradient(circle,#fff,#bbb,#444,#111);
}

.gear-logo{
  position:absolute;
  width:90px;
  height:90px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
}

/* ===== SLIDES ===== */
#slides{
  position:absolute;
  width:100%;
  height:100%;
  transition:transform 1.2s cubic-bezier(.22,1,.36,1);
}

/* SLIDE */
.slide{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
  overflow:hidden;
}

/* PARALLAX FONDO */
.slide::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at 30% 50%, rgba(0,200,255,.15), transparent 60%);
  transform:scale(1.2);
}

/* CONTENIDO */
.content{
  position:relative;
  z-index:2;
  max-width:900px;
}

/* TITULOS */
h1{
  font-size:3.5rem;
  text-shadow:0 0 25px rgba(0,200,255,.6);
}

/* FONDOS */
.slide:nth-child(1){ background:#0b1f3a;}
.slide:nth-child(2){ background:#102a54;}
.slide:nth-child(3){ background:#1d1f4d;}
.slide:nth-child(4){ background:#153b2e;}
.slide:nth-child(5){ background:#4a1b1b;}
.slide:nth-child(6){ background:#5a2d0c;}

/* ===== TARJETAS (SUBÁREAS) ===== */
.subareas{
  margin-top:40px;
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  width:160px;
  height:180px;
  border-radius:16px;
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(6px);
  display:flex;
  align-items:flex-end;
  padding:12px;
  cursor:pointer;

  transform:translateY(60px);
  opacity:0;
  transition:.6s;
}

.slide.active .card{
  transform:translateY(0);
  opacity:1;
}

.card:hover{
  transform:scale(1.05);
  background:rgba(255,255,255,.15);
}

.card span{
  font-size:14px;
}

/* ===== HINT ===== */
.gear-hint{
  position:absolute;
  left:50%;
  bottom:-60px;
  transform:translateX(-50%);
  color:white;
  font-size:14px;
  opacity:.7;
}

</style>
</head>

<body>

<div class="mto-flip" id="flip">

<!-- FRONT -->
<div class="mto-front">
<video autoplay muted loop>
<source src="https://warnermedia.sharepoint.com/sites/ChileOpsWBD/SiteAssets/VIDEOS/Video%20Anfitrion%20Operaciones.mp4">
</video>

<div class="mto-overlay">
<h1>BIENVENIDOS A OPERACIONES</h1>
<div class="mto-logo"></div>
<button class="mto-cta" onclick="enter()">Conócenos</button>
</div>
</div>

<!-- BACK -->
<div class="mto-back">

<button class="back-btn" onclick="volver()">Volver</button>

<div id="gearWrap">
<div id="gear"></div>
<div class="gear-core">
<div class="gear-core-metal"></div>
<div class="gear-logo"></div>
</div>
<div class="gear-hint">Usa la rueda del mouse ⚙️</div>
</div>

<div id="slides">

<section class="slide active">
<div class="content">
<h1>NUESTRAS ÁREAS</h1>
<p>Operamos como un sistema sincronizado que conecta contenido con millones de pantallas</p>
</div>
</section>

<section class="slide">
<div class="content">
<h1>MOC</h1>

<div class="subareas">
<div class="card"><span>Ingesta</span></div>
<div class="card"><span>Monitoreo</span></div>
<div class="card"><span>Control</span></div>
</div>

</div>
</section>

<section class="slide"><h1>BOC</h1></section>
<section class="slide"><h1>GESTIÓN</h1></section>
<section class="slide"><h1>GFX</h1></section>

</div>

</div>
</div>

<script>

/* FLIP */
function enter(){
  document.getElementById("flip").classList.add("flipped");
}
function volver(){
  document.getElementById("flip").classList.remove("flipped");
}

/* SLIDES */
let current=0;
const slides=document.querySelectorAll(".slide");

function update(){
  document.getElementById("slides").style.transform =
    `translateY(-${current*100}vh)`;

  slides.forEach(s=>s.classList.remove("active"));
  slides[current].classList.add("active");
}

/* ENGRANAJE FÍSICO PRO */
let velocity=0;
let rotation=0;

function animate(){
  rotation+=velocity;
  velocity*=0.92; // 🔥 inercia más real
  document.getElementById("gear").style.transform=`rotate(${rotation}deg)`;
  requestAnimationFrame(animate);
}
animate();

/* SCROLL PREMIUM */
let lock=false;

window.addEventListener("wheel", e=>{
  if(lock) return;
  lock=true;

  velocity += e.deltaY * 0.015;

  if(e.deltaY>0) current++;
  else current--;

  current=Math.max(0,Math.min(current,slides.length-1));

  update();

  setTimeout(()=>lock=false,500);

},{passive:false});

</script>

</body>
</html>
