<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT&O Experience</title>

<style>

/* ===== RESET ===== */
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:black;
}

/* ===== FLIP ===== */
.mto-flip{
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:1s;
}
.mto-flip.flipped{ transform:rotateY(180deg); }

.mto-front,.mto-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
}
.mto-back{ transform:rotateY(180deg); }

/* ===== VIDEO ===== */
video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== OVERLAY ===== */
.mto-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.6);
  color:white;
  text-align:center;
}

.mto-overlay h1{
  font-size:2.6rem;
  letter-spacing:3px;
}

.mto-logo{
  width:320px;
  height:140px;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
  margin:20px 0;
}

.mto-cta{
  padding:14px 30px;
  border:1px solid white;
  border-radius:30px;
  background:transparent;
  color:white;
  cursor:pointer;
  transition:.3s;
}
.mto-cta:hover{
  background:white;
  color:black;
}

/* ===== BACK ===== */
.mto-back{ background:#000; }

/* ===== ENGRANAJE ===== */
#gearWrap{
  position:fixed;
  width:520px;
  height:520px;
  left:-120px;
  top:50%;
  transform:translateY(-50%);
  z-index:50;
}

#gear{
  width:100%;
  height:100%;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png?csf=1&web=1&e=uamKCV") center/contain no-repeat;
}

/* CENTRO */
.gear-core{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:180px;
  height:180px;
}
.gear-core-metal{
  width:100%;
  height:100%;
  border-radius:50%;
  background: radial-gradient(circle,#fff,#bbb,#444,#111);
}
.gear-logo{
  position:absolute;
  width:90px;
  height:90px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
}

/* ===== HINT ===== */
.gear-hint{
  position:absolute;
  left:50%;
  bottom:-60px;
  transform:translateX(-50%);
  font-size:14px;
  color:#e0f7ff;
  display:flex;
  gap:8px;
  align-items:center;
  opacity:.8;
}

.gear-hint::before{
  content:"⚙️";
}

/* ===== BOTÓN VOLVER ===== */
.back-btn{
  position:fixed;
  top:20px;
  right:20px;
  z-index:100;
  padding:10px 20px;
  border:1px solid white;
  border-radius:20px;
  background:transparent;
  color:white;
  cursor:pointer;
}

/* ===== SLIDES ===== */
#slides{
  position:absolute;
  width:100%;
  height:100%;
  transition:transform 1s cubic-bezier(.22,1,.36,1);
}

.slide{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* FONDOS CORPORATIVOS */
.slide:nth-child(1){ background:#081a2b;}
.slide:nth-child(2){ background:#0f2e4f;}
.slide:nth-child(3){ background:#1b1f4a;}
.slide:nth-child(4){ background:#0f3a2e;}
.slide:nth-child(5){ background:#4a1f1f;}
.slide:nth-child(6){ background:#5a300f;}

/* TITULOS */
h1{
  font-size:3.2rem;
  color:white;
  text-shadow:0 0 20px rgba(0,200,255,.5);
}

/* SUBAREAS BURBUJAS */
.subareas{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  margin-top:40px;
}

.bubble{
  width:120px;
  height:120px;
  border-radius:50%;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:.4s;
}

.bubble:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px rgba(0,200,255,.6);
}

.bubble img{
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:.4;
}

.bubble span{
  position:absolute;
  opacity:0;
  transition:.3s;
}

.bubble:hover span{
  opacity:1;
}

/* ===== TITULO HERO ===== */
.hero-title{
  font-size:4rem;
  letter-spacing:4px;
  margin-bottom:10px;
}

.hero-sub{
  opacity:.7;
}

</style>
</head>

<body>

<div class="mto-flip" id="flip">

<!-- FRONT -->
<div class="mto-front">
<video autoplay muted loop>
<source src="https://warnermedia.sharepoint.com/sites/ChileOpsWBD/SiteAssets/VIDEOS/Video%20Anfitrion%20Operaciones.mp4">
</video>

<div class="mto-overlay">
<h1>BIENVENIDOS A OPERACIONES</h1>
<div class="mto-logo"></div>
<button class="mto-cta" onclick="enter()">Conócenos</button>
</div>
</div>

<!-- BACK -->
<div class="mto-back">

<button class="back-btn" onclick="volver()">Volver</button>

<div id="gearWrap">
<div id="gear"></div>
<div class="gear-core">
<div class="gear-core-metal"></div>
<div class="gear-logo"></div>
</div>
<div class="gear-hint">Usa la rueda del mouse</div>
</div>

<div id="slides">

<!-- HERO -->
<section class="slide">
<div>
<div class="hero-title">NUESTRAS ÁREAS</div>
<div class="hero-sub">Equipos sincronizados para llevar contenido a millones</div>
</div>
</section>

<!-- ÁREA -->
<section class="slide">
<div>
<h1>ESTUDIOS & OUTDOOR</h1>
<div class="subareas">
<div class="bubble"><img src=""><span>Cámaras</span></div>
<div class="bubble"><img src=""><span>Iluminación</span></div>
<div class="bubble"><img src=""><span>Audio</span></div>
</div>
</div>
</section>

<section class="slide">
<div>
<h1>MOC</h1>
<div class="subareas">
<div class="bubble"><img src=""><span>Ingesta</span></div>
<div class="bubble"><img src=""><span>Monitoreo</span></div>
</div>
</div>
</section>

<section class="slide">
<div><h1>BOC</h1></div>
</section>

<section class="slide">
<div><h1>GESTIÓN</h1></div>
</section>

<section class="slide">
<div><h1>GFX</h1></div>
</section>

</div>

</div>
</div>

<script>

/* ===== FLIP ===== */
function enter(){
  document.getElementById("flip").classList.add("flipped");
}
function volver(){
  document.getElementById("flip").classList.remove("flipped");
}

/* ===== SCROLL CONTROL ===== */
let current=0;
const slides=document.querySelectorAll(".slide");

/* ===== ENGRANAJE FÍSICA REAL ===== */
let velocity=0;
let rotation=0;

function animate(){
  rotation+=velocity;
  velocity*=0.94; // fricción real

  document.getElementById("gear").style.transform =
    `rotate(${rotation}deg)`;

  requestAnimationFrame(animate);
}
animate();

/* ===== SCROLL ===== */
let lock=false;

window.addEventListener("wheel", e=>{

  if(lock) return;
  lock=true;

  velocity += e.deltaY * 0.015; // 🔥 natural

  if(e.deltaY>0) current++;
  else current--;

  current=Math.max(0,Math.min(current,slides.length-1));

  document.getElementById("slides").style.transform =
    `translateY(-${current*100}vh)`;

  setTimeout(()=>lock=false,350);

},{passive:false});

</script>

</body>
</html>
