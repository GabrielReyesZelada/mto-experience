<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT&O Experience</title>

<style>

/* ===== RESET ===== */
body, html{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:black;
}

/* ===== APP ===== */
#mtoApp{
  width:100vw;
  height:100vh;
  overflow:hidden;
}

/* ===== STAGE ===== */
.mto-stage{
  position:relative;
  width:100%;
  height:100%;
  perspective:1200px;
}

/* ===== FLIP ===== */
.mto-flip{
  position:absolute;
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:1s;
}
.mto-flip.flipped{
  transform:rotateY(180deg);
}

/* ===== CARAS ===== */
.mto-front, .mto-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
}

.mto-back{
  transform:rotateY(180deg);
}

/* ===== VIDEO ===== */
.mto-front video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== OVERLAY ===== */
.mto-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.5);
  color:white;
}

/* ===== LOGO ===== */
.mto-logo{
  width:300px;
  height:120px;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
  margin:20px 0;
}

/* ===== BOTÓN ===== */
.mto-cta{
  padding:12px 28px;
  border:1px solid white;
  border-radius:30px;
  background:transparent;
  color:white;
  cursor:pointer;
}

/* ===== BACK ===== */
.mto-back{
  background:#001a40;
}

/* ===== GEAR ===== */
#gearWrap{
  position:absolute;
  width:500px;
  height:500px;
  left:-100px;
  top:50%;
  transform:translateY(-50%);
}

#gear{
  width:100%;
  height:100%;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png?csf=1&web=1&e=uamKCV") center/contain no-repeat;
}

/* ===== SLIDES ===== */
#mtoScript2{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.slide{
  position:absolute;
  text-align:center;
  opacity:0;
  transform:translateY(40px);
  transition:.6s;
}

.slide.active{
  opacity:1;
  transform:translateY(0);
}

h1{
  font-size:3rem;
}

  /* ===== CORE DEL ENGRANAJE ===== */
.gear-core{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:180px;
  height:180px;
  pointer-events:none;
}

/* METAL */
.gear-core-metal{
  width:100%;
  height:100%;
  border-radius:50%;

  background: radial-gradient(circle,
    #ffffff 0%,
    #d0d0d0 25%,
    #888 50%,
    #333 75%,
    #111 100%
  );

  box-shadow:
    inset 0 6px 12px rgba(255,255,255,.8),
    inset 0 -12px 25px rgba(0,0,0,.9);
}

/* LOGO CENTRO */
.gear-logo{
  position:absolute;
  width:90px;
  height:90px;

  top:50%;
  left:50%;
  transform:translate(-50%,-50%);

  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;

  filter:grayscale(1) contrast(2) brightness(.6);
  mix-blend-mode:multiply;
}

  .gear-logo{
  ...
  filter:
    grayscale(1)
    contrast(2)
    brightness(.6)
    drop-shadow(0 0 8px rgba(0,200,255,.4));
}

</style>
</head>

<body>

<div id="mtoApp">
  <div class="mto-stage">
    <div class="mto-flip" id="flip">

      <!-- FRONT -->
      <div class="mto-front">
        <video autoplay muted loop playsinline>
          <source src="https://warnermedia.sharepoint.com/sites/ChileOpsWBD/SiteAssets/VIDEOS/Video%20Anfitrion%20Operaciones.mp4">
        </video>

        <div class="mto-overlay">
          <div class="mto-logo"></div>
          <button class="mto-cta" onclick="enter()">Conócenos</button>
        </div>
      </div>

      <!-- BACK -->
      <div class="mto-back">

        <div id="gearWrap">

  <div id="gear"></div>

  <!-- 🔥 CENTRO DEL ENGRANAJE -->
  <div class="gear-core">
    <div class="gear-core-metal"></div>
    <div class="gear-logo"></div>
  </div>

</div>

        <div id="mtoScript2">

          <section class="slide active">
            <h1>NUESTRAS ÁREAS</h1>
          </section>

          <section class="slide">
            <h1>ESTUDIOS & OUTDOOR</h1>
          </section>

          <section class="slide">
            <h1>MOC</h1>
          </section>

          <section class="slide">
            <h1>BOC</h1>
          </section>

          <section class="slide">
            <h1>GESTIÓN</h1>
          </section>

          <section class="slide">
            <h1>GFX</h1>
          </section>

        </div>

      </div>

    </div>
  </div>
</div>

<script>

/* ===== FLIP ===== */
function enter(){
  document.getElementById("flip").classList.add("flipped");
}

/* ===== SLIDES ===== */
let currentSlide = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(index){
  slides.forEach(s => s.classList.remove("active"));
  slides[index].classList.add("active");
}

/* ===== GEAR ROTATION ===== */
let velocity = 0;
let rotation = 0;

function animate(){

  rotation += velocity;
  velocity *= 1.5; // 🔥 fricción (clave del peso)

  const gear = document.getElementById("gear");
  if(gear){
    gear.style.transform = "rotate("+rotation+"deg)";
  }

  requestAnimationFrame(animate);
}
animate();
/* ===== SCROLL ===== */
let isScrolling = false;

window.addEventListener("wheel", (e)=>{

  const wrap = document.getElementById("gearWrap");
  const r = wrap.getBoundingClientRect();

  const inside =
    e.clientX > r.left &&
    e.clientX < r.right &&
    e.clientY > r.top &&
    e.clientY < r.bottom;

  if(!inside) return;

  e.preventDefault();

  if(isScrolling) return;
  isScrolling = true;

  if(e.deltaY > 0){
  currentSlide++;
  velocity += 2.5; // 🔥 impulso
} else {
  currentSlide--;
  velocity -= 2.5;
}

  currentSlide = Math.max(0, Math.min(currentSlide, slides.length - 1));
  showSlide(currentSlide);

  setTimeout(()=> isScrolling = false, 700);

},{ passive:false });

</script>

</body>
</html>
