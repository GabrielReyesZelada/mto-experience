<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT&O Experience</title>

<style>

/* ===== BASE ===== */
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:black;
  color:white;
}

/* ===== FLIP ===== */
.mto-flip{
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:1s;
}
.mto-flip.flipped{ transform:rotateY(180deg); }

.mto-front,.mto-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
}
.mto-back{ transform:rotateY(180deg); }

/* ===== VIDEO ===== */
video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== OVERLAY ===== */
.mto-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.55);
}

/* ===== BOTÓN PRO ===== */
.mto-cta{
  margin-top:25px;
  padding:14px 34px;
  border-radius:40px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.4);
  color:white;
  cursor:pointer;
  backdrop-filter:blur(8px);
  transition:.35s;
}
.mto-cta:hover{
  background:rgba(0,200,255,0.15);
  border:1px solid rgba(0,200,255,0.6);
  box-shadow:0 0 20px rgba(0,200,255,.4);
}

/* ===== AMBIENTE ===== */
#ambientParticles{
  position:fixed;
  inset:0;
  pointer-events:none;
}

.ambient-dot{
  position:absolute;
  width:2px;
  height:2px;
  background:rgba(0,200,255,.4);
  border-radius:50%;
  animation:float 12s linear infinite;
}

@keyframes float{
  from{ transform:translateY(100vh); opacity:0;}
  10%,90%{ opacity:.6;}
  to{ transform:translateY(-10vh); opacity:0;}
}

/* ===== ENGRANAJE ===== */
#gearWrap{
  position:fixed;
  width:520px;
  height:520px;
  left:-120px;
  top:50%;
  transform:translateY(-50%);
}

#gear{
  width:100%;
  height:100%;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png?csf=1&web=1&e=uamKCV") center/contain no-repeat;
}

/* CENTRO */
.gear-core{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:180px;
  height:180px;
  border-radius:50%;
  background:radial-gradient(circle,#fff,#bbb,#444,#111);
}

.gear-logo{
  position:absolute;
  width:90px;
  height:90px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
  animation:pulse 3s infinite;
}

@keyframes pulse{
  0%,100%{ filter:brightness(1);}
  50%{ filter:brightness(1.4);}
}

/* ===== SLIDES ===== */
#slides{
  position:absolute;
  width:100%;
  height:100%;
  transition:transform 1s cubic-bezier(.22,1,.36,1);
}

.slide{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* fondos */
.slide:nth-child(1){background:#0b1f3a;}
.slide:nth-child(2){background:#102a54;}
.slide:nth-child(3){background:#1d1f4d;}
.slide:nth-child(4){background:#153b2e;}
.slide:nth-child(5){background:#4a1b1b;}
.slide:nth-child(6){background:#5a2d0c;}

h1{font-size:3rem;}

/* ===== SUBAREAS ===== */
.subareas{
  display:flex;
  gap:30px;
  margin-top:30px;
}

.bubble{
  width:140px;
  height:140px;
  border-radius:50%;
  background-size:cover;
  background-position:center;
  cursor:pointer;
  transition:.3s;
}
.bubble:hover{
  transform:scale(1.1);
}

/* ===== PANEL ===== */
#panel{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  opacity:0;
  pointer-events:none;
  transition:.4s;
}
#panel.active{
  opacity:1;
  pointer-events:auto;
}

.panel-img{flex:1;background-size:cover;}
.panel-content{flex:1;padding:40px;}

</style>
</head>

<body>

<div id="ambientParticles"></div>

<audio id="ambientSound" loop src="https://assets.mixkit.co/active_storage/sfx/212/212-preview.mp3"></audio>

<div class="mto-flip" id="flip">

<!-- FRONT -->
<div class="mto-front">
<video autoplay muted loop>
<source src="https://warnermedia.sharepoint.com/sites/ChileOpsWBD/SiteAssets/VIDEOS/Video%20Anfitrion%20Operaciones.mp4">
</video>

<div class="mto-overlay">
<h1>BIENVENIDOS A OPERACIONES</h1>
<button class="mto-cta" onclick="enter()">Conócenos</button>
</div>
</div>

<!-- BACK -->
<div class="mto-back">

<div id="gearWrap">
<div id="gear"></div>
<div class="gear-core">
<div class="gear-logo"></div>
</div>
</div>

<div id="slides">

<section class="slide">
<h1>NUESTRAS ÁREAS</h1>
</section>

<section class="slide">
<h1>ESTUDIOS & OUTDOOR</h1>
<div class="subareas">
<div class="bubble" data-name="Cámara" style="background-image:url('https://images.unsplash.com/photo-1492724441997-5dc865305da7')"></div>
<div class="bubble" data-name="Audio" style="background-image:url('https://images.unsplash.com/photo-1511379938547-c1f69419868d')"></div>
</div>
</section>

</div>

</div>
</div>

<div id="panel">
<div class="panel-img"></div>
<div class="panel-content">
<h1 id="pTitle"></h1>
</div>
</div>

<script>

/* ===== AMBIENTE ===== */
const ambient = document.getElementById("ambientParticles");
for(let i=0;i<40;i++){
  const dot=document.createElement("div");
  dot.className="ambient-dot";
  dot.style.left=Math.random()*100+"vw";
  ambient.appendChild(dot);
}

/* ===== FLIP ===== */
function enter(){
  document.getElementById("ambientSound").play();
  document.getElementById("flip").classList.add("flipped");
}

/* ===== SCROLL + INERCIA ===== */
let current=0, velocity=0, rotation=0;
const slides=document.querySelectorAll(".slide");

function animate(){
  rotation+=velocity;
  velocity*=0.95;
  document.getElementById("gear").style.transform=`rotate(${rotation}deg)`;
  requestAnimationFrame(animate);
}
animate();

window.addEventListener("wheel", e=>{
  velocity+=e.deltaY*0.01;

  if(e.deltaY>0) current++;
  else current--;

  current=Math.max(0,Math.min(current,slides.length-1));

  document.getElementById("slides").style.transform=`translateY(-${current*100}vh)`;
});

/* ===== PANEL ===== */
document.querySelectorAll(".bubble").forEach(b=>{
  b.onclick=()=>{
    document.getElementById("panel").classList.add("active");
    document.querySelector(".panel-img").style.backgroundImage=b.style.backgroundImage;
    document.getElementById("pTitle").innerText=b.dataset.name;
  }
});

</script>

</body>
</html>
