<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT&O Experience</title>

<style>

/* ===== BASE ===== */
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:black;
}

/* ===== FLIP ===== */
.mto-flip{
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:1s;
}
.mto-flip.flipped{ transform:rotateY(180deg); }

.mto-front,.mto-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
}
.mto-back{ transform:rotateY(180deg); }

/* ===== VIDEO ===== */
video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== OVERLAY ===== */
.mto-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.55);
  color:white;
  text-align:center;
}

.mto-overlay h1{
  font-size:2.6rem;
  letter-spacing:4px;
}

.mto-logo{
  width:320px;
  height:140px;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
  margin:20px 0;
}

/* BOTÓN */
.mto-cta{
  padding:14px 30px;
  border:1px solid white;
  border-radius:30px;
  background:transparent;
  color:white;
  cursor:pointer;
}
.mto-cta:hover{
  background:white;
  color:black;
}

/* ===== BACK ===== */
.mto-back{ background:#000; }

/* ===== BOTÓN VOLVER ===== */
.back-btn{
  position:fixed;
  top:25px;
  right:25px;
  z-index:100;
  padding:10px 20px;
  border:1px solid white;
  border-radius:20px;
  background:transparent;
  color:white;
  cursor:pointer;
}

/* ===== ENGRANAJE ===== */
#gearWrap{
  position:fixed;
  width:520px;
  height:520px;
  left:-120px;
  top:50%;
  transform:translateY(-50%);
  z-index:50;
}

#gear{
  width:100%;
  height:100%;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png?csf=1&web=1&e=uamKCV") center/contain no-repeat;
}

.gear-core{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:180px;
  height:180px;
}

.gear-core-metal{
  width:100%;
  height:100%;
  border-radius:50%;
  background: radial-gradient(circle,#fff,#bbb,#444,#111);
}

.gear-logo{
  position:absolute;
  width:90px;
  height:90px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
}

/* HINT */
.gear-hint{
  position:absolute;
  left:50%;
  bottom:-60px;
  transform:translateX(-50%);
  color:white;
  font-size:14px;
  opacity:.7;
}

/* ===== SLIDES ===== */
#slides{
  position:absolute;
  width:100%;
  height:100%;
  transition:transform 1s cubic-bezier(.22,1,.36,1);
}

.slide{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.content{
  max-width:900px;
}

/* FONDOS */
.slide:nth-child(1){ background:#0b1f3a;}
.slide:nth-child(2){ background:#102a54;}
.slide:nth-child(3){ background:#1d1f4d;}
.slide:nth-child(4){ background:#153b2e;}
.slide:nth-child(5){ background:#4a1b1b;}
.slide:nth-child(6){ background:#5a2d0c;}

/* TITULOS */
h1{
  font-size:3.2rem;
  text-shadow:0 0 20px rgba(0,200,255,.5);
}

/* ===== BURBUJAS ===== */
.subareas{
  margin-top:40px;
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.sub{
  width:120px;
  height:120px;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  position:relative;
  overflow:hidden;

  opacity:0;
  transform:translateY(40px) scale(.8);
  transition:.6s;
}

.slide.active .sub{
  opacity:1;
  transform:translateY(0) scale(1);
}

.sub:hover{
  transform:scale(1.1);
}

.sub span{
  opacity:0;
  transition:.3s;
}

.sub:hover span{
  opacity:1;
}

/* ===== PANEL ===== */
#areaPanel{
  position:fixed;
  inset:0;
  display:flex;
  opacity:0;
  pointer-events:none;
  transition:.5s;
  z-index:999;
}

#areaPanel.active{
  opacity:1;
  pointer-events:auto;
}

.panel-media{
  flex:1;
  background-size:cover;
  background-position:center;
}

.panel-content{
  flex:1;
  background:black;
  padding:60px;
}

.close-btn{
  position:absolute;
  top:30px;
  right:40px;
  background:none;
  border:1px solid white;
  color:white;
  padding:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="mto-flip" id="flip">

<!-- FRONT -->
<div class="mto-front">
<video autoplay muted loop>
<source src="https://warnermedia.sharepoint.com/sites/ChileOpsWBD/SiteAssets/VIDEOS/Video%20Anfitrion%20Operaciones.mp4">
</video>

<div class="mto-overlay">
<h1>BIENVENIDOS A OPERACIONES</h1>
<div class="mto-logo"></div>
<button class="mto-cta" onclick="enter()">Conócenos</button>
</div>
</div>

<!-- BACK -->
<div class="mto-back">

<button class="back-btn" onclick="volver()">Volver</button>

<div id="gearWrap">
<div id="gear"></div>
<div class="gear-core">
<div class="gear-core-metal"></div>
<div class="gear-logo"></div>
</div>
<div class="gear-hint">Usa la rueda del mouse ⚙️</div>
</div>

<div id="slides">

<section class="slide active">
<div class="content">
<h1>NUESTRAS ÁREAS</h1>
<p>Equipos que operan sincronizados para llevar el contenido a millones de pantallas</p>
</div>
</section>

<section class="slide">
<div class="content">
<h1>MOC</h1>
<div class="subareas">
<div class="sub"><span>Ingesta</span></div>
<div class="sub"><span>Monitoreo</span></div>
<div class="sub"><span>Control</span></div>
</div>
</div>
</section>

<section class="slide">
<div class="content">
<h1>BOC</h1>
</div>
</section>

<section class="slide">
<div class="content">
<h1>GESTIÓN</h1>
</div>
</section>

<section class="slide">
<div class="content">
<h1>GFX</h1>
</div>
</section>

</div>

</div>
</div>

<script>

/* FLIP */
function enter(){
  document.getElementById("flip").classList.add("flipped");
}
function volver(){
  document.getElementById("flip").classList.remove("flipped");
}

/* SLIDES */
let current=0;
const slides=document.querySelectorAll(".slide");

function update(){
  document.getElementById("slides").style.transform =
    `translateY(-${current*100}vh)`;

  slides.forEach(s=>s.classList.remove("active"));
  slides[current].classList.add("active");
}

/* ENGRANAJE FÍSICO */
let velocity=0;
let rotation=0;

function animate(){
  rotation+=velocity;
  velocity*=0.94;
  document.getElementById("gear").style.transform=`rotate(${rotation}deg)`;
  requestAnimationFrame(animate);
}
animate();

/* SCROLL REAL */
let lock=false;

window.addEventListener("wheel", e=>{
  if(lock) return;
  lock=true;

  velocity += e.deltaY * 0.01;

  if(e.deltaY>0) current++;
  else current--;

  current=Math.max(0,Math.min(current,slides.length-1));
  update();

  setTimeout(()=>lock=false,400);

},{passive:false});

</script>

</body>
</html>
