<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT&O Experience</title>

<style>

/* ===== BASE ===== */
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:black;
}

/* ===== FLIP ===== */
.mto-flip{
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:1.1s cubic-bezier(.22,1,.36,1);
}
.mto-flip.flipped{ transform:rotateY(180deg); }

.mto-front,.mto-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
}
.mto-back{ transform:rotateY(180deg); }

/* ===== VIDEO ===== */
video{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.08);
  transition:2s;
}

/* ===== OVERLAY ===== */
.mto-overlay{
  position:absolute;
  inset:0;
  z-index:5;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.6);
  color:white;
  text-align:center;
}

.mto-overlay h1{
  font-size:2.6rem;
  letter-spacing:4px;
}

/* ===== BOTÓN CINE (RECUPERADO) ===== */
.mto-cta{
  position:relative;
  z-index:6;
  margin-top:30px;
  padding:16px 40px;
  border-radius:40px;
  border:1px solid rgba(255,255,255,.6);
  background:rgba(255,255,255,.05);
  color:white;
  cursor:pointer;
  backdrop-filter:blur(8px);
  transition:.4s;
}

.mto-cta:hover{
  transform:scale(1.1);
  background:white;
  color:black;
  box-shadow:0 0 30px rgba(255,255,255,.7);
}

.mto-cta:active{
  transform:scale(.95);
  box-shadow:0 0 40px rgba(0,200,255,1);
}

/* ===== BACK ===== */
.mto-back{ background:#000; }

/* ===== BOTÓN VOLVER ===== */
.back-btn{
  position:fixed;
  top:20px;
  right:20px;
  z-index:100;
  padding:10px 20px;
  border-radius:20px;
  border:1px solid white;
  background:transparent;
  color:white;
  cursor:pointer;
}

/* ===== ENGRANAJE ===== */
#gearWrap{
  position:fixed;
  width:520px;
  height:520px;
  left:-120px;
  top:50%;
  transform:translateY(-50%);
  z-index:50;
  pointer-events: none;
}

#gear{
  width:100%;
  height:100%;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png?csf=1&web=1&e=uamKCV") center/contain no-repeat;
}

/* ===== CENTRO ===== */
.gear-core{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:180px;
  height:180px;
  border-radius:50%;
  background: radial-gradient(circle,#fff,#bbb,#444,#111);
}

.gear-logo{
  position:absolute;
  width:95px;
  height:95px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
}

/* ===== HINT ===== */
.gear-hint{
  position:absolute;
  bottom:-60px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  opacity:.7;
  font-size:14px;
}

/* ===== SLIDES ===== */

.slide{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  will-change: transform;
}

/* ===== FONDOS ===== */
.slide:nth-child(1){
  background:
    radial-gradient(circle at center, #00c8ff33, #000 70%),
    linear-gradient(to bottom, #020617, #000);
}

.slide:nth-child(2){
  background:
    radial-gradient(circle at 30% 40%, #00c8ff22, transparent 60%),
    linear-gradient(120deg, #0a1f3a, #000);
}

  .slide:nth-child(3){
  background:
    radial-gradient(circle at center, #102a54, #000 80%),
    radial-gradient(circle at 60% 40%, #00c8ff22, transparent 60%);
}

.slide:nth-child(4){
  background:
    linear-gradient(120deg, #2a0f0f, #000),
    radial-gradient(circle at 70% 50%, #ff003322, transparent 60%);
}

.slide:nth-child(5){
  background:
    linear-gradient(120deg, #0f2a1f, #000),
    radial-gradient(circle at 40% 60%, #00ff8833, transparent 60%);
}

.slide:nth-child(6){
  background:
    linear-gradient(120deg, #1a0f2a, #000),
    radial-gradient(circle at 50% 50%, #ff00c833, transparent 60%);
}

/* ===== TITULOS ===== */
h1{
  font-size:3.5rem;
  color:white;
}

/* ===== SUBAREAS ===== */
.subareas{
  margin-top:40px;
  display:flex;
  gap:30px;
  flex-wrap:wrap;
  justify-content:center;
}

.bubble{
  backdrop-filter: blur(8px) contrast(1.2);
  border:1px solid rgba(255,255,255,.08);

  box-shadow:
    0 0 15px rgba(0,200,255,.3),
    0 0 40px rgba(255,0,200,.2);

  transition:.4s;
}
/* CAPA DE DISTORSIÓN */
.bubble::before{
  content:"";
  position:absolute;
  inset:-30%;

  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.15), transparent 60%),
    radial-gradient(circle at 70% 70%, rgba(0,200,255,.2), transparent 60%);

  filter: blur(25px);
  mix-blend-mode: overlay;

  animation: liquidMove 7s ease-in-out infinite alternate;
}

/* SEGUNDA CAPA (más profundidad) */
.bubble::after{
  content:"";
  position:absolute;
  inset:0;
  background:inherit;

  opacity:.2;
  transform:scale(1.2);
  filter: blur(10px);

  animation: liquidShift 10s ease-in-out infinite;
}

@keyframes liquidMove{
  0%{ transform:translate(0,0) scale(1); }
  50%{ transform:translate(-10px,10px) scale(1.1); }
  100%{ transform:translate(10px,-10px) scale(1); }
}

@keyframes liquidShift{
  0%{ transform:scale(1.2) translate(0,0); }
  50%{ transform:scale(1.3) translate(6px,-6px); }
  100%{ transform:scale(1.2) translate(-6px,6px); }
}

/* MOVIMIENTO ORGÁNICO */
@keyframes liquidMove{
  0%{
    transform:translate(0,0) scale(1);
  }
  50%{
    transform:translate(-10px,10px) scale(1.1);
  }
  100%{
    transform:translate(10px,-10px) scale(1);
  }
}

@keyframes liquidShift{
  0%{
    transform:scale(1.2) translate(0,0);
  }
  50%{
    transform:scale(1.3) translate(5px,-5px);
  }
  100%{
    transform:scale(1.2) translate(-5px,5px);
  }
}

  .bubble{
  box-shadow:
    0 0 10px rgba(255,0,200,.6),
    0 0 30px rgba(0,200,255,.6);
  transition:.4s;
}

.bubble:hover{
  transform:scale(1.12);
  box-shadow:
    0 0 40px rgba(0,200,255,.8),
    0 0 80px rgba(255,0,200,.6);
}

.bubble:hover::before{
  filter: blur(35px);
}

.bubble:hover::after{
  transform:scale(1.35);
}

/* ===== PANEL ===== */
#panel{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  opacity:0;
  pointer-events:none;
  transition:.4s;
  z-index:999;
}

#panel.active{
  opacity:1;
  pointer-events:auto;
}

.panel-img{
  flex:1;
  background-size:cover;
}

.panel-content{
  flex:1;
  padding:60px;
  color:white;
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  cursor:pointer;
}

/* ===== ENERGÍA BOTÓN ===== */

.energy-burst{
  position:absolute;
  width:20px;
  height:20px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(0,200,255,.9), transparent 70%);
  opacity:0;
  transform:scale(0);
  pointer-events:none;
}

/* expansión */
.energy-burst.active{
  animation:burst 0.8s ease-out forwards;
}

@keyframes burst{
  0%{
    opacity:1;
    transform:scale(0);
  }
  70%{
    opacity:.6;
    transform:scale(25);
  }
  100%{
    opacity:0;
    transform:scale(40);
  }
}

/* glow botón activo */
.mto-cta.active{
  box-shadow:
    0 0 40px rgba(0,200,255,.9),
    0 0 80px rgba(0,200,255,.6);
}

/* ===== ACTIVACIÓN ENGRANAJE ===== */
.gear-activate{
  animation:gearKick 0.6s ease-out;
}

@keyframes gearKick{
  0%{ transform:scale(0.9) rotate(0deg); }
  50%{ transform:scale(1.05) rotate(20deg); }
  100%{ transform:scale(1) rotate(0deg); }
}

/* glow centro */
.gear-core.active{
  box-shadow:
    inset 0 8px 20px rgba(255,255,255,.8),
    inset 0 -15px 30px rgba(0,0,0,1),
    0 0 60px rgba(0,200,255,.6);
}

#slides{
  position:absolute;
  width:100%;
  height:100%;
  transition:transform 0.85s cubic-bezier(.22,1,.36,1);
  will-change: transform; /* 🔥 AQUÍ sí va */
}

.bubble::marker{ content:none; } /* evitar bugs raros */

.bubble::before{
  content:"";
  position:absolute;
  inset:-6px;
  border-radius:50%;

  background: conic-gradient(
    from 0deg,
    rgba(0,200,255,0),
    rgba(0,200,255,.8),
    rgba(255,0,200,.9),
    rgba(0,200,255,.8),
    rgba(0,200,255,0)
  );

  filter: blur(4px);
  animation: spinEnergy 4s linear infinite;
  z-index:2;
}

@keyframes spinEnergy{
  from{ transform:rotate(0deg); }
  to{ transform:rotate(360deg); }
}

.bubble{
  backdrop-filter: blur(6px) contrast(1.2);
  -webkit-backdrop-filter: blur(6px) contrast(1.2);
}

.bubble:active{
  transform:scale(0.9);
  box-shadow:
    0 0 40px rgba(0,200,255,1),
    inset 0 0 30px rgba(255,255,255,.4);
}

/* 🔥 FIX CAPAS (CLAVE DEL BUG) */
.mto-front{
  z-index:2;
}

.mto-back{
  z-index:1;
  pointer-events:none;
}

.mto-flip.flipped .mto-front{
  pointer-events:none;
}

.mto-flip.flipped .mto-back{
  pointer-events:auto;
  z-index:3;
}

/* 🔥 BOTÓN VOLVER SIEMPRE ARRIBA */
.back-btn{
  z-index:9999;
}

/* 🔥 ENGRANAJE MÁS VISIBLE */
#gearWrap{
  z-index:200;
}

/* 🔥 HINT MEJORADO */
.gear-hint{
  bottom:-35px;
  opacity:.9;
  font-size:14px;
  display:flex;
  align-items:center;
  gap:10px;
}

/* mini engranaje visual */
.gear-hint::before{
  content:"";
  width:16px;
  height:16px;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png?csf=1&web=1&e=uamKCV") center/contain no-repeat;
  display:inline-block;
}

/* 🔥 ASEGURAR CLICK EN BURBUJAS */
.bubble{
  pointer-events:auto;
  z-index:10;
}

/* ===== SISTEMA GLOBAL (coherencia visual) ===== */

:root{
  --cian:#00c8ff;
  --magenta:#ff00c8;
  --deep:#020617;
}

/* textura base para TODA la experiencia */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, #00c8ff10, transparent 40%),
    radial-gradient(circle at 80% 70%, #ff00c810, transparent 40%);
  pointer-events:none;
  z-index:1;
}

/* aura del engranaje */
#gearWrap::after{
  content:"";
  position:absolute;
  inset:-40px;
  border-radius:50%;
  background:
    radial-gradient(circle, rgba(0,200,255,.2), transparent 70%);
  filter:blur(25px);
  animation: gearPulse 4s ease-in-out infinite;
}

@keyframes gearPulse{
  0%{ transform:scale(1); opacity:.4; }
  50%{ transform:scale(1.2); opacity:.8; }
  100%{ transform:scale(1); opacity:.4; }
}

.slide h1{
  font-size:3.5rem;
  letter-spacing:2px;
  text-shadow:0 0 20px rgba(0,200,255,.3);
}

.slide::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, transparent, rgba(0,0,0,.6));
  pointer-events:none;
}

/* ===== MENÚ SUPERIOR ===== */
#topMenu{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
  z-index:500;
  backdrop-filter: blur(10px);
  padding:10px 20px;
  border-radius:30px;
  background:rgba(0,0,0,.3);
  border:1px solid rgba(255,255,255,.1);
}

.menu-item{
  color:white;
  font-size:14px;
  cursor:pointer;
  opacity:.6;
  transition:.3s;
  position:relative;
}

.menu-item:hover{
  opacity:1;
  text-shadow:0 0 10px rgba(0,200,255,.8);
}

/* activo */
.menu-item.active{
  opacity:1;
}

.menu-item.active::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-6px;
  width:100%;
  height:2px;
  background:linear-gradient(to right, #00c8ff, #ff00c8);
  box-shadow:0 0 10px rgba(0,200,255,.8);
}

</style>
</head>

<script>

/* ===== FLIP ===== */
function enter(){

  const btn = document.querySelector(".mto-cta");
  const burst = document.getElementById("energyBurst");
  const gearEl = document.getElementById("gear");
  const core = document.querySelector(".gear-core");
  const video = document.getElementById("video");

  // 1. CLICK
  btn.classList.add("active");

  const rect = btn.getBoundingClientRect();
  burst.style.left = rect.left + rect.width/2 + "px";
  burst.style.top = rect.top + rect.height/2 + "px";
  burst.classList.remove("active"); // reset por si acaso
  void burst.offsetWidth; // 🔥 fuerza reflow para reiniciar animación
  burst.classList.add("active");

  // 🔥 AGRANDAR visualmente el burst (clave)
  burst.style.transform = "scale(1.8)";

  // 2. ARRANQUE FUERTE
  gearEl.classList.add("gear-activate");
  core.classList.add("active");

  velocity += 8; // 🔥 MUCHO más fuerte

  // 🎥 video realmente “se apaga”
  video.style.transform = "scale(1.25)";
  video.style.filter = "brightness(0.25) blur(4px)";

  // 3. COLA DE ENERGÍA (mantener vivo el sistema)
  setTimeout(()=>{
    velocity += 4;
  },200);

  setTimeout(()=>{
    velocity += 2;
  },450);

  setTimeout(()=>{
    velocity += 1;
  },700);

  // 4. FLIP MÁS TARDE (deja respirar el arranque)
  setTimeout(()=>{
    document.getElementById("flip").classList.add("flipped");
  },1400);

}

function volver(){
  document.getElementById("flip").classList.remove("flipped");
}

/* ===== SCROLL SUAVE ===== */

let current = 0;
const slides = document.querySelectorAll(".slide");
let scrollAccumulator = 0;
const SCROLL_THRESHOLD = 80;

function update(){
  document.getElementById("slides").style.transform =
    `translateY(-${current * 100}vh)`;

  // actualizar menú activo
  menuItems.forEach(item=>{
    item.classList.remove("active");
  });

  if(menuItems[current]){
    menuItems[current].classList.add("active");
  }
}

window.addEventListener("wheel", e=>{

  scrollAccumulator += e.deltaY;

  // engranaje
  velocity += e.deltaY * 0.015;

  if(Math.abs(scrollAccumulator) < SCROLL_THRESHOLD) return;

  if(scrollAccumulator > 0){
    current++;
  } else {
    current--;
  }

  scrollAccumulator = 0;

  current = Math.max(0, Math.min(current, slides.length - 1));

  update();

},{ passive:true });

const menuItems = document.querySelectorAll(".menu-item");


menuItems.forEach(item=>{
  item.addEventListener("click", ()=>{

    const targetIndex = parseInt(item.dataset.index);

    // dirección del movimiento
    const direction = targetIndex > current ? 1 : -1;
    const steps = Math.abs(targetIndex - current);

    // pequeño impulso al engranaje (coherencia física)
    velocity += direction * (1.5 + steps * 0.5);

    // transición directa (manteniendo sistema)
    current = targetIndex;
    update();
  });
});

/* ===== ENGRANAJE ===== */
  
let velocity = 0;
let rotation = 0;

const gear = document.getElementById("gear"); // 🔥 ESTA LÍNEA FALTABA

function animate(){
  rotation += velocity;
  velocity *= 0.975;

  if(gear){
    gear.style.transform = `rotate(${rotation}deg)`;
  }

  // 🔥 feedback visual más limpio
  document.querySelectorAll(".bubble").forEach(b=>{
    let influence = Math.min(Math.abs(velocity)*1.5, 3);
    b.style.filter = `brightness(${1 + influence*0.15})`;
  });

  requestAnimationFrame(animate);
}

animate();
  
/* ===== PANEL ===== */

document.querySelectorAll(".bubble").forEach(b=>{
  b.onclick=()=>{
    document.getElementById("panel").classList.add("active");
    document.querySelector(".panel-img").style.backgroundImage=b.style.backgroundImage;
    document.getElementById("pTitle").innerText=b.dataset.name;
  }
});

function closePanel(){
  document.getElementById("panel").classList.remove("active");
}

</script>
