<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT&O Experience</title>

<style>

/* ===== RESET ===== */
body, html{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:black;
}

/* ===== APP ===== */
#mtoApp{
  width:100vw;
  height:100vh;
  overflow:hidden;
}

/* ===== STAGE ===== */
.mto-stage{
  position:relative;
  width:100%;
  height:100%;
  perspective:1200px;
}

/* ===== FLIP ===== */
.mto-flip{
  position:absolute;
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:1s;
}
.mto-flip.flipped{
  transform:rotateY(180deg);
}

.mto-front, .mto-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
}

.mto-back{
  transform:rotateY(180deg);
  overflow:hidden;
}

/* ===== VIDEO ===== */
.mto-front video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== OVERLAY ===== */
.mto-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.6);
  color:white;
}

/* ===== LOGO ===== */
.mto-logo{
  width:300px;
  height:120px;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
  margin:20px 0;
}

/* ===== BOTÓN ===== */
.mto-cta{
  padding:12px 28px;
  border:1px solid white;
  border-radius:30px;
  background:transparent;
  color:white;
  cursor:pointer;
}

/* ===== ENGRANAJE ===== */
#gearWrap{
  position:fixed;
  width:520px;
  height:520px;
  left:-120px;
  top:50%;
  transform:translateY(-50%);
  z-index:50;
}

#gear{
  width:100%;
  height:100%;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png?csf=1&web=1&e=uamKCV") center/contain no-repeat;
}

/* ===== HINT ===== */
.gear-hint{
  position:absolute;
  left:50%;
  bottom:-60px;
  transform:translateX(-50%);
  color:#9fdcff;
}

/* ===== SCROLL ===== */
#slides{
  position:absolute;
  width:100%;
}

.slide{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
  overflow:hidden;
}

/* ===== PARALLAX ===== */
.parallax{
  position:absolute;
  inset:0;
  background-size:cover;
  opacity:.25;
  transform:translateY(0);
}

/* ===== CONTENIDO ===== */
.content{
  position:relative;
  z-index:2;
}

h1{
  font-size:3rem;
  color:#66d9ff;
}

/* ===== SUBÁREAS ===== */
.subareas{
  margin-top:40px;
}

.sub{
  margin:10px 0;
  cursor:pointer;
  transition:.4s;
}

.sub:hover{
  transform:translateX(10px);
}

/* ===== PREVIEW ===== */
.preview{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  opacity:0;
  pointer-events:none;
  transition:.5s;
  z-index:40;
}

.preview.active{
  opacity:.4;
}

/* ===== MODAL ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:.4s;
  z-index:100;
}

.modal.active{
  opacity:1;
  pointer-events:auto;
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  color:white;
  cursor:pointer;
}

</style>
</head>

<body>

<div id="mtoApp">
<div class="mto-stage">
<div class="mto-flip" id="flip">

<!-- FRONT -->
<div class="mto-front">
<video autoplay muted loop playsinline>
<source src="https://warnermedia.sharepoint.com/sites/ChileOpsWBD/SiteAssets/VIDEOS/Video%20Anfitrion%20Operaciones.mp4">
</video>

<div class="mto-overlay">
<div class="mto-logo"></div>
<button class="mto-cta" onclick="enter()">Conócenos</button>
</div>
</div>

<!-- BACK -->
<div class="mto-back">

<div id="gearWrap">
  <div id="gear"></div>
  <div class="gear-hint">⚙️ Usa la rueda</div>
</div>

<div id="slides">

<section class="slide">
<div class="parallax" style="background-image:url('https://picsum.photos/1200/800?1')"></div>
<div class="content">
<h1>NUESTRAS ÁREAS</h1>
</div>
</section>

<section class="slide">
<div class="parallax" style="background-image:url('https://picsum.photos/1200/800?2')"></div>
<div class="content">
<h1>MOC</h1>
<div class="subareas">
<div class="sub" data-img="https://picsum.photos/1200/800?3">Ingesta</div>
<div class="sub" data-img="https://picsum.photos/1200/800?4">Archivo</div>
</div>
</div>
</section>

</div>

</div>
</div>
</div>
</div>

<div class="preview" id="preview"></div>

<div class="modal" id="modal">
<div class="close" onclick="closeModal()">✕</div>
<h1 style="color:white">Detalle Área</h1>
</div>

<script>

/* ===== FLIP ===== */
function enter(){
  document.getElementById("flip").classList.add("flipped");
}

/* ===== SCROLL ===== */
let scrollY = 0;

window.addEventListener("wheel", e=>{
  scrollY += e.deltaY;
  document.getElementById("slides").style.transform =
    `translateY(-${scrollY}px)`;

  velocity += e.deltaY * 0.002;

});

/* ===== ENGRANAJE ===== */
let velocity = 0;
let rotation = 0;

function animate(){
  rotation += velocity;
  velocity *= 0.94;
  document.getElementById("gear").style.transform =
    `rotate(${rotation}deg)`;
  requestAnimationFrame(animate);
}
animate();

/* ===== PARALLAX ===== */
window.addEventListener("scroll", ()=>{
  document.querySelectorAll(".parallax").forEach(el=>{
    el.style.transform = `translateY(${window.scrollY * 0.2}px)`;
  });
});

/* ===== PREVIEW ===== */
const preview = document.getElementById("preview");

document.querySelectorAll(".sub").forEach(el=>{
  el.addEventListener("mouseenter", ()=>{
    preview.style.backgroundImage = `url(${el.dataset.img})`;
    preview.classList.add("active");
  });
  el.addEventListener("mouseleave", ()=>{
    preview.classList.remove("active");
  });
});

/* ===== MODAL ===== */
document.querySelectorAll(".slide").forEach(slide=>{
  slide.addEventListener("click", ()=>{
    document.getElementById("modal").classList.add("active");
  });
});

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

/* ===== SONIDO ===== */
const audio = new Audio("https://www.soundjay.com/mechanical/sounds/gear-1.mp3");

window.addEventListener("wheel", ()=>{
  audio.volume = 0.05;
  audio.play().catch(()=>{});
});

</script>

</body>
</html>
