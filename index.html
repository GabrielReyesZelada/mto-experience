<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT&O Experience</title>

<style>

/* ===== RESET ===== */
body, html{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:black;
}

/* ===== APP ===== */
#mtoApp{
  width:100vw;
  height:100vh;
}

/* ===== FLIP ===== */
.mto-flip{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:1s;
}
.mto-flip.flipped{
  transform:rotateY(180deg);
}

.mto-front, .mto-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
}

.mto-back{
  transform:rotateY(180deg);
  background:#000814;
}

/* ===== VIDEO ===== */
video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== OVERLAY ===== */
.mto-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.55);
  color:white;
  text-align:center;
}

.mto-logo{
  width:280px;
  height:120px;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
  margin:20px 0;
}

.mto-cta{
  padding:12px 28px;
  border:1px solid white;
  border-radius:30px;
  background:transparent;
  color:white;
  cursor:pointer;
}

/* ===== ENGRANAJE PEQUEÑO ===== */
#gearWrap{
  position:fixed;
  width:520px;
  height:520px;
  left:-120px;
  top:50%;
  transform:translateY(-50%);
  z-index:50;
}

#gear{
  width:100%;
  height:100%;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png?csf=1&web=1&e=uamKCV") center/contain no-repeat;
}

.gear-core{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:180px;
  height:180px;
}

.gear-core-metal{
  width:100%;
  height:100%;
  border-radius:50%;
  background: radial-gradient(circle,#fff,#ccc 30%,#888 60%,#222 100%);
}

.gear-logo{
  position:absolute;
  width:90px;
  height:90px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
}

/* ===== HINT ===== */
.gear-hint{
  position:absolute;
  left:50%;
  bottom:-60px;
  transform:translateX(-50%);
  font-size:14px;
  color:#ffffffcc;
}

.gear-hint::before{
  content:"⚙️ ";
}

/* ===== BOTÓN ===== */
.back-btn{
  position:fixed;
  top:20px;
  right:20px;
  z-index:60;
  padding:10px 20px;
  border:1px solid white;
  border-radius:20px;
  background:transparent;
  color:white;
  cursor:pointer;
}

/* ===== SLIDES ===== */
.slide{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  padding-left:25%;
  overflow:hidden;

  opacity:0;
  transform:translateY(100%);
  transition:all .8s ease;
}

.slide.active{
  opacity:1;
  transform:translateY(0);
}

/* ===== ENGRANAJE GIGANTE ===== */
.slide::before{
  content:"";
  position:absolute;

  width:1400px;
  height:1400px;

  left:-300px;
  top:50%;
  transform:translateY(-50%) rotate(0deg);

  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png?csf=1&web=1&e=uamKCV") center/contain no-repeat;

  opacity:.07;
  pointer-events:none;

  /* agujero central */
  -webkit-mask-image: radial-gradient(circle, transparent 160px, black 180px);
  mask-image: radial-gradient(circle, transparent 160px, black 180px);
}

/* ===== TITULOS ===== */
h1{
  font-size:4rem;
  color:#00c8ff;
  margin:0;
}

/* ===== SUBAREAS ===== */
.subareas{
  margin-top:30px;
}

.sub{
  opacity:0;
  transform:translateX(-40px);
  transition:.6s;
  margin:8px 0;
}

.slide.active .sub{
  opacity:1;
  transform:translateX(0);
}

</style>
</head>

<body>

<div id="mtoApp">
<div class="mto-flip" id="flip">

<!-- FRONT -->
<div class="mto-front">
<video autoplay muted loop>
<source src="https://warnermedia.sharepoint.com/sites/ChileOpsWBD/SiteAssets/VIDEOS/Video%20Anfitrion%20Operaciones.mp4">
</video>

<div class="mto-overlay">
<h2>MEDIA TECHNOLOGY & OPERATIONS</h2>
<div class="mto-logo"></div>
<button class="mto-cta" onclick="enter()">Conócenos</button>
</div>
</div>

<!-- BACK -->
<div class="mto-back">

<button class="back-btn" onclick="volver()">Volver</button>

<div id="gearWrap">
  <div id="gear"></div>
  <div class="gear-core">
    <div class="gear-core-metal"></div>
    <div class="gear-logo"></div>
  </div>
  <div class="gear-hint">Usa la rueda del mouse</div>
</div>

<div id="slides">

<section class="slide active">
<div>
<h1>NUESTRAS ÁREAS</h1>
<p>Equipos sincronizados para llevar el fútbol a millones de pantallas</p>
</div>
</section>

<section class="slide">
<div>
<h1>ESTUDIOS & OUTDOOR</h1>
<div class="subareas">
<div class="sub">Iluminación</div>
<div class="sub">Cámara</div>
<div class="sub">Audio</div>
<div class="sub">Móviles</div>
</div>
</div>
</section>

<section class="slide">
<div>
<h1>MOC</h1>
<div class="subareas">
<div class="sub">Ingesta</div>
<div class="sub">Archivo</div>
<div class="sub">Replay</div>
</div>
</div>
</section>

<section class="slide">
<div>
<h1>BOC</h1>
<div class="subareas">
<div class="sub">Broadcast Ops Center</div>
</div>
</div>
</section>

<section class="slide">
<div>
<h1>GESTIÓN</h1>
<div class="subareas">
<div class="sub">Gestión</div>
<div class="sub">Pañol</div>
</div>
</div>
</section>

<section class="slide">
<div>
<h1>GFX</h1>
<div class="subareas">
<div class="sub">Gráfica</div>
</div>
</div>
</section>

</div>
</div>
</div>
</div>

<script>

/* ===== FLIP ===== */
function enter(){
  document.getElementById("flip").classList.add("flipped");
}
function volver(){
  document.getElementById("flip").classList.remove("flipped");
}

/* ===== SLIDES ===== */
let current = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(i){
  slides.forEach(s=>s.classList.remove("active"));
  slides[i].classList.add("active");
}

/* ===== ENGRANAJES ===== */
let velocity = 0;
let rotation = 0;
let bgRotation = 0;

function animate(){

  rotation += velocity;
  bgRotation += velocity * 0.6;

  velocity *= 0.92;

  document.getElementById("gear").style.transform =
    `rotate(${rotation}deg)`;

  document.querySelectorAll(".slide").forEach(slide=>{
    slide.style.setProperty("--rot", bgRotation);
    slide.style.setProperty("transform-bg", `rotate(${bgRotation}deg)`);
    slide.style.setProperty("--bg-rot", bgRotation + "deg");
    slide.style.setProperty("--bg-transform", `translateY(-50%) rotate(${bgRotation}deg)`);
    slide.style.querySelector?.(":before");
  });

  /* aplicar directo */
  document.querySelectorAll(".slide").forEach(s=>{
    s.style.setProperty("--bg-rotation", bgRotation);
    s.style.setProperty("--bg-transform", `translateY(-50%) rotate(${bgRotation}deg)`);
  });

  document.querySelectorAll(".slide").forEach(s=>{
    s.style.setProperty("--rot", bgRotation);
    s.style.setProperty("--transform", `translateY(-50%) rotate(${bgRotation}deg)`);
    s.style.setProperty("--custom-rot", bgRotation);
    s.style.setProperty("--bg-rot", bgRotation + "deg");
  });

  document.querySelectorAll(".slide").forEach(s=>{
    s.style.setProperty("--bg-rot", bgRotation + "deg");
    s.style.style = s.style.cssText.replace(/rotate\([^)]+\)/, `rotate(${bgRotation}deg)`);
  });

  requestAnimationFrame(animate);
}
animate();

/* ===== SCROLL ===== */
let lock=false;

window.addEventListener("wheel", e=>{
  if(lock) return;

  lock=true;

  if(e.deltaY>0){
    current++;
    velocity +=1.5;
  }else{
    current--;
    velocity -=1.5;
  }

  current=Math.max(0,Math.min(current,slides.length-1));
  showSlide(current);

  setTimeout(()=>lock=false,600);

},{passive:false});

</script>

</body>
</html>
