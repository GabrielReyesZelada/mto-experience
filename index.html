<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT&O Experience</title>

<style>

/* ===== BASE ===== */
body,html{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
background:black;
color:white;
}

/* ===== FLIP ===== */
.mto-flip{
width:100%;
height:100%;
position:absolute;
transform-style:preserve-3d;
transition:1s;
}
.flipped{ transform:rotateY(180deg); }

.mto-front,.mto-back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
}
.mto-back{ transform:rotateY(180deg); }

/* ===== VIDEO ===== */
video.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(.4);
}

/* ===== OVERLAY ===== */
.overlay{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.overlay h1{
font-size:2.5rem;
letter-spacing:3px;
}

/* ===== CTA ===== */
.mto-cta{
margin-top:20px;
padding:12px 30px;
border:1px solid white;
border-radius:30px;
cursor:pointer;
background:transparent;
color:white;
}

/* ===== GEAR ===== */
#gearWrap{
position:fixed;
left:-120px;
top:50%;
transform:translateY(-50%);
width:520px;
height:520px;
z-index:10;
}

#gear{
width:100%;
height:100%;
background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png?csf=1&web=1&e=uamKCV") center/contain no-repeat;
}

/* centro */
.gear-core{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:180px;
height:180px;
}

.gear-core-metal{
width:100%;
height:100%;
border-radius:50%;
background:radial-gradient(circle,#fff,#888,#111);
}

.gear-logo{
position:absolute;
width:90px;
height:90px;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
}

/* ===== HINT ===== */
.gear-hint{
position:absolute;
bottom:-60px;
left:50%;
transform:translateX(-50%);
font-size:14px;
}
.gear-hint::before{content:"⚙️ ";}

/* ===== SLIDES ===== */
#slides{
position:absolute;
width:100%;
height:100%;
}

.slide{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
transition:transform 1s ease;
}

.content{
z-index:2;
}

/* ===== BROADCAST GRID ===== */
.grid{
position:absolute;
width:100%;
height:100%;
background:
linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
background-size:40px 40px;
pointer-events:none;
}

/* ===== LINES ===== */
.lines{
position:absolute;
width:100%;
height:100%;
pointer-events:none;
}

.lines::before{
content:"";
position:absolute;
width:200%;
height:2px;
background:#00c8ff;
animation:scan 6s linear infinite;
opacity:.3;
}

@keyframes scan{
0%{ transform:translateY(0); }
100%{ transform:translateY(100vh); }
}

/* ===== SUBAREAS ===== */
.subareas{
margin-top:30px;
display:flex;
flex-direction:column;
gap:12px;
}

.sub{
cursor:pointer;
opacity:.7;
transition:.3s;
}
.sub:hover{
opacity:1;
transform:translateX(10px);
color:#00c8ff;
}

/* ===== PANEL ===== */
.panel{
position:fixed;
right:-400px;
top:0;
width:400px;
height:100%;
background:#111;
padding:30px;
transition:.5s;
z-index:100;
}
.panel.open{ right:0; }

/* ===== VOLVER ===== */
.back-btn{
position:fixed;
top:20px;
right:20px;
z-index:200;
padding:10px 20px;
border:1px solid white;
background:transparent;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="mto-flip" id="flip">

<!-- FRONT -->
<div class="mto-front">
<video class="bg" autoplay muted loop>
<source src="https://warnermedia.sharepoint.com/sites/ChileOpsWBD/SiteAssets/VIDEOS/Video%20Anfitrion%20Operaciones.mp4">
</video>

<div class="overlay">
<h1>BIENVENIDOS A OPERACIONES - CHILE</h1>
<button class="mto-cta" onclick="flip.classList.add('flipped')">Conócenos</button>
</div>
</div>

<!-- BACK -->
<div class="mto-back">

<button class="back-btn" onclick="flip.classList.remove('flipped')">Volver</button>

<!-- GEAR -->
<div id="gearWrap">
<div id="gear"></div>
<div class="gear-core">
<div class="gear-core-metal"></div>
<div class="gear-logo"></div>
</div>
<div class="gear-hint">Usa la rueda del mouse</div>
</div>

<div id="slides">

<!-- 1 -->
<section class="slide">
<video class="bg" autoplay muted loop>
<source src="https://www.w3schools.com/howto/rain.mp4">
</video>
<div class="grid"></div>
<div class="lines"></div>
<div class="content">
<h1 style="color:#00c8ff">NUESTRAS ÁREAS</h1>
</div>
</section>

<!-- 2 -->
<section class="slide">
<video class="bg" autoplay muted loop>
<source src="https://www.w3schools.com/howto/forest.mp4">
</video>
<div class="grid"></div>
<div class="content">
<h1>ESTUDIOS & OUTDOOR</h1>
<div class="subareas">
<div class="sub" onclick="openPanel('Producción en estudio')">Producción en estudio</div>
<div class="sub" onclick="openPanel('Operaciones en terreno')">Operaciones en terreno</div>
</div>
</div>
</section>

<!-- 3 -->
<section class="slide">
<video class="bg" autoplay muted loop>
<source src="https://www.w3schools.com/howto/matrix.mp4">
</video>
<div class="grid"></div>
<div class="content">
<h1>MOC</h1>
<div class="subareas">
<div class="sub" onclick="openPanel('Ingesta')">Ingesta</div>
<div class="sub" onclick="openPanel('Monitoreo')">Monitoreo</div>
</div>
</div>
</section>

</div>

</div>
</div>

<div id="panel" class="panel"></div>

<script>

/* SLIDES */
let current=0;
const slides=document.querySelectorAll(".slide");

function update(){
slides.forEach((s,i)=>{
s.style.transform=`translateY(${(i-current)*100}%)`;
});
}
update();

/* GEAR */
let v=0,r=0;

function anim(){
r+=v;
v*=0.94;
gear.style.transform=`rotate(${r}deg)`;
requestAnimationFrame(anim);
}
anim();

/* SCROLL */
let lock=false;

window.addEventListener("wheel",e=>{
if(lock)return;
lock=true;

if(e.deltaY>0){current++;v+=2;}
else{current--;v-=2;}

current=Math.max(0,Math.min(current,slides.length-1));
update();

setTimeout(()=>lock=false,500);

},{passive:false});

/* PANEL */
function openPanel(t){
panel.innerHTML=`<h2>${t}</h2><p>Contenido real aquí...</p>`;
panel.classList.add("open");
}

</script>

</body>
</html>
