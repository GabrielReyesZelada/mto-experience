<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT&O Experience</title>

<style>

/* ===== RESET ===== */
body, html{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:black;
}

/* ===== APP ===== */
#mtoApp{
  width:100vw;
  height:100vh;
}

/* ===== STAGE ===== */
.mto-stage{
  position:relative;
  width:100%;
  height:100%;
  perspective:1200px;
}

/* ===== FLIP ===== */
.mto-flip{
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:1s;
}
.mto-flip.flipped{
  transform:rotateY(180deg);
}

/* ===== CARAS ===== */
.mto-front, .mto-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
}

.mto-back{
  transform:rotateY(180deg);
  background:#001a40;
}

/* ===== VIDEO ===== */
.mto-front video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== OVERLAY ===== */
.mto-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.5);
  color:white;
}

/* ===== TEXTO ===== */
.mto-title{
  text-align:center;
  margin-bottom:20px;
}

.mto-title h1{
  font-size:28px;
  letter-spacing:2px;
  margin-bottom:10px;
}

.mto-title p{
  font-size:13px;
  letter-spacing:3px;
  opacity:.7;
}

/* ===== LOGO ===== */
.mto-logo{
  width:280px;
  height:120px;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
  margin:15px 0;
}

/* ===== BOTONES ===== */
.mto-cta, .back-btn{
  padding:12px 28px;
  border:1px solid white;
  border-radius:30px;
  background:transparent;
  color:white;
  cursor:pointer;
}

.back-btn{
  position:absolute;
  top:30px;
  right:30px;
}

/* ===== GEAR ===== */
#gearWrap{
  position:absolute;
  width:500px;
  height:500px;
  left:-100px;
  top:50%;
  transform:translateY(-50%);
}

#gear{
  width:100%;
  height:100%;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png?csf=1&web=1&e=uamKCV") center/contain no-repeat;
}

/* ===== CENTRO ===== */
.gear-core{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:180px;
  height:180px;
}

.gear-core-metal{
  width:100%;
  height:100%;
  border-radius:50%;
  background: radial-gradient(circle,#fff,#aaa,#333);
}

.gear-logo{
  position:absolute;
  width:90px;
  height:90px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
}

/* ===== SLIDES ===== */
#mtoScript2{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.slide{
  position:absolute;
  text-align:center;
  opacity:0;
  transform:translateY(40px);
  transition:.6s;
}

.slide.active{
  opacity:1;
  transform:translateY(0);
}

h1{
  font-size:3rem;
}

/* ===== SUBÁREAS ===== */
.subareas{
  margin-top:30px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.sub{
  opacity:0;
  transform:translateY(20px);
  transition:.6s;
}

.slide.active .sub{
  opacity:1;
  transform:translateY(0);
}

.slide.active .sub:nth-child(1){ transition-delay:.2s }
.slide.active .sub:nth-child(2){ transition-delay:.35s }
.slide.active .sub:nth-child(3){ transition-delay:.5s }
.slide.active .sub:nth-child(4){ transition-delay:.65s }

</style>
</head>

<body>

<div id="mtoApp">
<div class="mto-stage">
<div class="mto-flip" id="flip">

<!-- FRONT -->
<div class="mto-front">

<video autoplay muted loop playsinline>
<source src="https://warnermedia.sharepoint.com/sites/ChileOpsWBD/SiteAssets/VIDEOS/Video%20Anfitrion%20Operaciones.mp4">
</video>

<div class="mto-overlay">

<div class="mto-title">
<h1>BIENVENIDOS</h1>
<div class="mto-logo"></div>
<p>MEDIA TECHNOLOGY & OPERATIONS • CHILE</p>
</div>

<button class="mto-cta" id="enterBtn">Conócenos</button>

</div>
</div>

<!-- BACK -->
<div class="mto-back">

<button class="back-btn" id="backBtn">Volver</button>

<div id="gearWrap">
  <div id="gear"></div>

  <div class="gear-core">
    <div class="gear-core-metal"></div>
    <div class="gear-logo"></div>
  </div>
</div>

<div id="mtoScript2">

<section class="slide active">
  <h1>NUESTRAS ÁREAS</h1>
</section>

<section class="slide">
  <h1>ESTUDIOS & OUTDOOR</h1>
  <div class="subareas">
    <div class="sub">Estudios TV</div>
    <div class="sub">Producción terreno</div>
    <div class="sub">Equipamiento</div>
  </div>
</section>

<section class="slide"><h1>MOC</h1></section>
<section class="slide"><h1>BOC</h1></section>
<section class="slide"><h1>GESTIÓN</h1></section>
<section class="slide"><h1>GFX</h1></section>

</div>

</div>
</div>
</div>
</div>

<script>

/* ===== BOTONES ===== */
document.getElementById("enterBtn").addEventListener("click", ()=>{
  document.getElementById("flip").classList.add("flipped");
});

document.getElementById("backBtn").addEventListener("click", ()=>{
  document.getElementById("flip").classList.remove("flipped");
});

/* ===== SLIDES ===== */
let currentSlide = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(i){
  slides.forEach(s=>s.classList.remove("active"));
  slides[i].classList.add("active");
}

/* ===== GEAR ===== */
let velocity = 0;
let rotation = 0;

function animate(){
  rotation += velocity;
  velocity *= 0.92; // 🔥 fricción real

  document.getElementById("gear").style.transform =
    "rotate("+rotation+"deg)";

  requestAnimationFrame(animate);
}
animate();

/* ===== SCROLL ===== */
let lock = false;

window.addEventListener("wheel", (e)=>{

  const r = gearWrap.getBoundingClientRect();

  const inside =
    e.clientX > r.left &&
    e.clientX < r.right &&
    e.clientY > r.top &&
    e.clientY < r.bottom;

  if(!inside) return;

  e.preventDefault();

  if(lock) return;
  lock = true;

  if(e.deltaY > 0){
    currentSlide++;
    velocity += 3; // 🔥 peso pro
  }else{
    currentSlide--;
    velocity -= 3;
  }

  currentSlide = Math.max(0, Math.min(currentSlide, slides.length-1));
  showSlide(currentSlide);

  setTimeout(()=> lock=false, 500);

},{ passive:false });

</script>

</body>
</html>
