<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT&O Experience</title>

<style>

/* ===== BASE ===== */
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:black;
}

/* ===== FLIP ===== */
.mto-flip{
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:1s;
}
.mto-flip.flipped{ transform:rotateY(180deg); }

.mto-front,.mto-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
}
.mto-back{ transform:rotateY(180deg); }

/* ===== VIDEO ===== */
video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== OVERLAY ===== */
.mto-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.55);
  color:white;
}

.mto-logo{
  width:320px;
  height:140px;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
  margin:20px 0;
}

.mto-cta{
  padding:14px 30px;
  border:1px solid white;
  border-radius:30px;
  background:transparent;
  color:white;
  cursor:pointer;
}

/* ===== BACK ===== */
.mto-back{ background:#000; }

/* ===== ENGRANAJE ===== */
#gearWrap{
  position:fixed;
  width:520px;
  height:520px;
  left:-120px;
  top:50%;
  transform:translateY(-50%);
  z-index:50;
}

#gear{
  width:100%;
  height:100%;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png?csf=1&web=1&e=uamKCV") center/contain no-repeat;
}

/* ===== SLIDES ===== */
#slides{
  position:absolute;
  width:100%;
  height:100%;
  transition:transform 1.2s cubic-bezier(.22,1,.36,1);
}

.slide{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* ===== FONDOS ===== */
.slide:nth-child(1){ background:#0f2f44;}
.slide:nth-child(2){ background:#1b3f7a;}
.slide:nth-child(3){ background:#3b1d5a;}
.slide:nth-child(4){ background:#1c4a36;}
.slide:nth-child(5){ background:#5a1d1d;}
.slide:nth-child(6){ background:#7a3b10;}

/* ===== TITULOS ===== */
h1{
  font-size:3.5rem;
  color:#fff;
}

/* ===== SUBAREAS PREMIUM ===== */
.subareas{
  margin-top:40px;
  display:flex;
  gap:30px;
  flex-wrap:wrap;
  justify-content:center;
}

/* burbuja */
.bubble{
  width:160px;
  height:160px;
  border-radius:50%;
  overflow:hidden;
  position:relative;

  background-size:cover;
  background-position:center;

  box-shadow:0 10px 30px rgba(0,0,0,.5);

  transform:translateY(40px) scale(.9);
  opacity:0;

  transition:all .6s ease;
}

/* entrada */
.slide.active .bubble{
  transform:translateY(0) scale(1);
  opacity:1;
}

/* delays */
.bubble:nth-child(1){ transition-delay:.2s;}
.bubble:nth-child(2){ transition-delay:.35s;}
.bubble:nth-child(3){ transition-delay:.5s;}
.bubble:nth-child(4){ transition-delay:.65s;}

/* hover reveal */
.bubble::after{
  content:attr(data-name);
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;

  background:rgba(0,0,0,.6);
  color:white;

  opacity:0;
  transition:.4s;
}

.bubble:hover::after{
  opacity:1;
}

/* flotación */
@keyframes float{
  0%{ transform:translateY(0);}
  50%{ transform:translateY(-10px);}
  100%{ transform:translateY(0);}
}

.bubble{
  animation:float 5s ease-in-out infinite;
}

/* ===== BOTÓN VOLVER ===== */
.back-btn{
  position:fixed;
  top:20px;
  right:20px;
  z-index:60;
  padding:10px 20px;
  border:1px solid white;
  border-radius:20px;
  background:transparent;
  color:white;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="mto-flip" id="flip">

<!-- FRONT -->
<div class="mto-front">
<video autoplay muted loop>
<source src="https://warnermedia.sharepoint.com/sites/ChileOpsWBD/SiteAssets/VIDEOS/Video%20Anfitrion%20Operaciones.mp4">
</video>

<div class="mto-overlay">
<h1>BIENVENIDOS A OPERACIONES</h1>
<div class="mto-logo"></div>
<button class="mto-cta" onclick="enter()">Conócenos</button>
</div>
</div>

<!-- BACK -->
<div class="mto-back">

<button class="back-btn" onclick="volver()">Volver</button>

<div id="gearWrap">
  <div id="gear"></div>
</div>

<div id="slides">

<section class="slide active">
<h1>NUESTRAS ÁREAS</h1>
</section>

<section class="slide">
<h1>ESTUDIOS & OUTDOOR</h1>
<div class="subareas">
<div class="bubble" data-name="Cámara" style="background-image:url('https://images.unsplash.com/photo-1492724441997-5dc865305da7')"></div>
<div class="bubble" data-name="Iluminación" style="background-image:url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d')"></div>
<div class="bubble" data-name="Audio" style="background-image:url('https://images.unsplash.com/photo-1511379938547-c1f69419868d')"></div>
</div>
</section>

<section class="slide">
<h1>MOC</h1>
<div class="subareas">
<div class="bubble" data-name="Ingesta"></div>
<div class="bubble" data-name="Archivo"></div>
<div class="bubble" data-name="Replay"></div>
</div>
</section>

<section class="slide"><h1>BOC</h1></section>
<section class="slide"><h1>GESTIÓN</h1></section>
<section class="slide"><h1>GFX</h1></section>

</div>

</div>
</div>

<script>

/* ===== CONTROL ===== */
function enter(){
  document.getElementById("flip").classList.add("flipped");
}

function volver(){
  document.getElementById("flip").classList.remove("flipped");
}

/* ===== SLIDES ===== */
let current=0;
const slides=document.querySelectorAll(".slide");

function update(){
  document.getElementById("slides").style.transform =
    `translateY(-${current*100}vh)`;

  slides.forEach(s=>s.classList.remove("active"));
  slides[current].classList.add("active");
}

/* ===== ENGRANAJE ===== */
let velocity=0;
let rotation=0;

function animate(){
  rotation+=velocity;
  velocity*=0.94;
  document.getElementById("gear").style.transform =
    `rotate(${rotation}deg)`;
  requestAnimationFrame(animate);
}
animate();

/* ===== SCROLL ===== */
let lock=false;

window.addEventListener("wheel", e=>{
  if(lock) return;
  lock=true;

  velocity += e.deltaY * 0.008;

  if(e.deltaY>0) current++;
  else current--;

  current=Math.max(0,Math.min(current,slides.length-1));

  update();

  setTimeout(()=>lock=false,500);

},{passive:false});

</script>

</body>
</html>
