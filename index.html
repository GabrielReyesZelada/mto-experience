<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT&O Experience</title>

<style>

/* ===== BASE ===== */
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:black;
}

/* ===== STAGE ===== */
.mto-stage{
  position:relative;
  width:100%;
  height:100%;
  perspective:1200px;
}

/* ===== FLIP ===== */
.mto-flip{
  position:absolute;
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition: transform 1s ease;
}

.mto-flip.flipped{
  transform: rotateY(180deg);
}

/* ===== FRONT / BACK ===== */
.mto-front,.mto-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
}

.mto-back{
  transform:rotateY(180deg);
}

/* CONTROL INTERACCIÓN */
.mto-front{ z-index:2; }
.mto-back{ z-index:1; pointer-events:none; }

.mto-flip.flipped .mto-front{
  pointer-events:none;
}

.mto-flip.flipped .mto-back{
  pointer-events:auto;
  z-index:3;
}

/* ===== VIDEO ===== */
video{
  width:100%;
  height:100%;
  object-fit:cover;
  pointer-events:none;
}

/* ===== OVERLAY ===== */
.mto-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.6);
  color:white;
}

.mto-cta{
  margin-top:30px;
  padding:16px 40px;
  border-radius:40px;
  border:1px solid white;
  background:transparent;
  color:white;
  cursor:pointer;
}

/* ===== BACK ===== */
.back-btn{
  position:fixed;
  top:20px;
  right:20px;
  z-index:9999;
}

/* ===== SLIDES ===== */
#slides{
  position:absolute;
  width:100%;
  height:100%;
  transition:transform .8s;
}

.slide{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
}

/* ===== SUBAREAS ===== */
.subareas{
  display:flex;
  gap:30px;
  flex-wrap:wrap;
  justify-content:center;
}

.crystal-ball{
  width:140px;
  height:140px;
  border-radius:50%;
  overflow:hidden;
  cursor:pointer;
  background:#222;
}

.bubble-img{
  width:100%;
  height:100%;
  background-size:cover;
}

/* ===== PANEL ===== */
#panel{
  position:fixed;
  inset:0;
  display:flex;
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:99999;
  background:black;
}

#panel.active{
  opacity:1;
  pointer-events:auto;
}

.panel-img{
  flex:1;
  background-size:cover;
  background-position:center;
}

.panel-content{
  flex:1;
  padding:60px;
  color:white;
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  cursor:pointer;
}

</style>
</head>


<body>

<div class="mto-stage">
  <div class="mto-flip" id="flip">

    <!-- ===== FRONT ===== -->
    <div class="mto-front">
      <video autoplay muted loop>
        <source src="https://warnermedia.sharepoint.com/sites/ChileOpsWBD/SiteAssets/VIDEOS/Video%20Anfitrion%20Operaciones.mp4">
      </video>

      <div class="mto-overlay">
        <h1>BIENVENIDOS A OPERACIONES</h1>
        <button class="mto-cta" onclick="enter()">Conócenos</button>
      </div>

      <div class="energy-burst" id="energyBurst"></div>
    </div>

    <!-- ===== BACK ===== -->
    <div class="mto-back">

      <button class="back-btn" onclick="volver()">Volver</button>

      <!-- ENGRANAJE -->
      <div id="gearWrap">
        <div id="gear"></div>
        <div class="gear-core"></div>
        <div class="gear-logo"></div>
        <div class="gear-hint">
          <div class="mini-gear"></div>
          <span>Usa la rueda del mouse</span>
        </div>
      </div>

      <!-- SLIDES -->
      <div id="slides">

        <section class="slide">
          <h1>NUESTRAS ÁREAS</h1>
        </section>

        <!-- ===== ESTUDIOS ===== -->
        <section class="slide">
          <h1>ESTUDIOS & OUTDOOR</h1>
          <div class="subareas">

            <div class="crystal-ball" data-name="Cámara">
              <div class="lens">
                <div class="bubble-img" style="background-image:url('https://images.unsplash.com/photo-1506784983877-45594efa4cbe')"></div>
                <div class="energy"></div>
              </div>
            </div>

            <div class="crystal-ball" data-name="Iluminación">
              <div class="lens">
                <div class="bubble-img" style="background-image:url('https://images.unsplash.com/photo-1492724441997-5dc865305da7')"></div>
                <div class="energy"></div>
              </div>
            </div>

          </div>
        </section>

        <!-- ===== MOC ===== -->
        <section class="slide">
          <h1>MOC</h1>
          <div class="subareas">

            <div class="crystal-ball" data-name="Switching">
              <div class="lens">
                <div class="portal-bg"></div>
                <div class="bubble-img" style="background-image:url('https://images.unsplash.com/photo-1518770660439-4636190af475')"></div>
                <div class="energy"></div>
                <div class="particles"></div>
              </div>
            </div>

          </div>
        </section>

      </div>

    </div>
  </div>
</div>

<!-- ===== PANEL ===== -->
<div id="panel">
  <div class="panel-img" id="panelImg"></div>
  <div class="panel-content">
    <div class="close" onclick="closePanel()">✕</div>
    <h1 id="pTitle"></h1>
    <p id="pText">Aquí puedes agregar descripción del área.</p>
  </div>
</div>

<script>

/* ===== FLIP ===== */
function enter(){
  document.getElementById("flip").classList.add("flipped");
}

function volver(){
  document.getElementById("flip").classList.remove("flipped");
}

/* ===== SCROLL ===== */
let current = 0;
const slides = document.querySelectorAll(".slide");

window.addEventListener("wheel", e=>{
  if(e.deltaY > 0) current++;
  else current--;

  current = Math.max(0, Math.min(current, slides.length - 1));

  document.getElementById("slides").style.transform =
    `translateY(-${current * 100}vh)`;

  velocity += e.deltaY * 0.02;
});

/* ===== ENGRANAJE ===== */
let velocity = 0;
let rotation = 0;

const gear = document.getElementById("gear");
const miniGear = document.querySelector(".mini-gear");

function animate(){
  rotation += velocity;
  velocity *= 0.95;

  if(gear) gear.style.transform = `rotate(${rotation}deg)`;
  if(miniGear) miniGear.style.transform = `rotate(${rotation * 1.5}deg)`;

  requestAnimationFrame(animate);
}
animate();

/* ===== PANEL (CLICK ESFERAS) ===== */
document.querySelectorAll(".crystal-ball").forEach(ball=>{

  ball.addEventListener("click", ()=>{

    const name = ball.dataset.name;
    const img = ball.querySelector(".bubble-img").style.backgroundImage;

    document.getElementById("panel").classList.add("active");
    document.getElementById("panelImg").style.backgroundImage = img;
    document.getElementById("pTitle").innerText = name;

  });

});

function closePanel(){
  document.getElementById("panel").classList.remove("active");
}

/* ===== PARTICULAS ===== */
document.querySelectorAll(".particles").forEach(container=>{
  for(let i=0;i<15;i++){
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random()*100 + "%";
    p.style.animationDuration = (3 + Math.random()*4) + "s";
    p.style.animationDelay = (Math.random()*5) + "s";
    container.appendChild(p);
  }
});

</script>

</body>
