<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT&O Experience</title>

<style>

/* ===== VARIABLES ===== */
:root{
  --cian:#00c8ff;
  --magenta:#ff00c8;
  --dark:#020617;
}

/* ===== BASE ===== */
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:black;
}

/* textura global */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, #00c8ff10, transparent 40%),
    radial-gradient(circle at 80% 70%, #ff00c810, transparent 40%);
  pointer-events:none;
}

/* ===== FLIP ===== */
.mto-flip{
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:1.1s cubic-bezier(.22,1,.36,1);
}
.mto-flip.flipped{ transform:rotateY(180deg); }

.mto-front,.mto-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
}

.mto-front{ z-index:2; }
.mto-back{
  transform:rotateY(180deg);
  z-index:1;
  pointer-events:none;
}

.mto-flip.flipped .mto-back{
  pointer-events:auto;
  z-index:3;
}

/* ===== VIDEO ===== */
video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== OVERLAY ===== */
.mto-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.6);
  color:white;
}

.mto-overlay h1{
  font-size:2.6rem;
  letter-spacing:4px;
}

/* ===== BOTÓN ===== */
.mto-cta{
  margin-top:30px;
  padding:16px 40px;
  border-radius:40px;
  border:1px solid rgba(255,255,255,.6);
  background:rgba(255,255,255,.05);
  color:white;
  cursor:pointer;
  transition:.4s;
}

.mto-cta:hover{
  transform:scale(1.1);
  background:white;
  color:black;
}

/* ===== BACK ===== */
.back-btn{
  position:fixed;
  top:20px;
  right:20px;
  z-index:9999;
  padding:10px 20px;
  border-radius:20px;
  border:1px solid white;
  background:transparent;
  color:white;
  cursor:pointer;
}

/* ===== ENGRANAJE ===== */
#gearWrap{
  position:fixed;
  width:520px;
  height:520px;
  left:-120px;
  top:50%;
  transform:translateY(-50%);
  z-index:200;
}

#gear{
  width:100%;
  height:100%;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png?csf=1&web=1&e=uamKCV") center/contain no-repeat;
}

/* aura */
#gearWrap::after{
  content:"";
  position:absolute;
  inset:-40px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(0,200,255,.2), transparent 70%);
  filter:blur(25px);
  animation:gearPulse 4s infinite;
}

@keyframes gearPulse{
  0%,100%{ transform:scale(1); opacity:.4; }
  50%{ transform:scale(1.2); opacity:.8; }
}

/* ===== SLIDES ===== */
.slide{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* fondos mejorados */
.slide:nth-child(1){
  background:radial-gradient(circle,#00c8ff33,#000 70%);
}

.slide:nth-child(2){
  background:linear-gradient(120deg,#0a1f3a,#000);
}

.slide:nth-child(3){
  background:linear-gradient(120deg,#102a54,#000);
}

.slide:nth-child(4){
  background:linear-gradient(120deg,#2a0f0f,#000);
}

.slide:nth-child(5){
  background:linear-gradient(120deg,#0f2a1f,#000);
}

.slide:nth-child(6){
  background:linear-gradient(120deg,#1a0f2a,#000);
}

/* títulos */
.slide h1{
  font-size:3.5rem;
  color:white;
  text-shadow:0 0 20px rgba(0,200,255,.3);
}

/* ===== BURBUJAS ===== */
.subareas{
  margin-top:40px;
  display:flex;
  gap:30px;
  flex-wrap:wrap;
  justify-content:center;
  position:relative;
}

.node{
  width:160px;
  height:160px;
  border-radius:50%;
  position:relative;

  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.2), transparent 60%),
    radial-gradient(circle at 70% 70%, rgba(0,200,255,.4), transparent 60%);

  backdrop-filter: blur(10px);
  
  box-shadow:
    inset 0 0 30px rgba(255,255,255,.1),
    0 0 40px rgba(0,200,255,.3);

  overflow:hidden;
}
.bubble:hover{
  transform:scale(1.12);
  box-shadow:
    0 0 40px rgba(0,200,255,.8),
    0 0 80px rgba(255,0,200,.6);
}

/* ===== PANEL ===== */
#panel{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  opacity:0;
  pointer-events:none;
  transition:.4s;
}

#panel.active{
  opacity:1;
  pointer-events:auto;
}

.panel-img{
  flex:1;
  background-size:cover;
}

.panel-content{
  flex:1;
  padding:60px;
  color:white;
}

/* ===== SCROLL ===== */
#slides{
  position:absolute;
  width:100%;
  height:100%;
  transition:transform 0.85s cubic-bezier(.22,1,.36,1);
}

</style>
</head>

<body>

<div class="mto-flip" id="flip">

<div class="mto-front">
<video autoplay muted loop>
<source src="https://warnermedia.sharepoint.com/sites/ChileOpsWBD/SiteAssets/VIDEOS/Video%20Anfitrion%20Operaciones.mp4">
</video>

<div class="mto-overlay">
<h1>BIENVENIDOS A OPERACIONES</h1>
<button class="mto-cta" onclick="enter()">Conócenos</button>
</div>
</div>

<div class="mto-back">

<button class="back-btn" onclick="volver()">Volver</button>

<div id="gearWrap">
  <div id="gear"></div>
</div>

<div id="slides">
<section class="slide"><h1>NUESTRAS ÁREAS</h1></section>
<section class="slide">
  
  <h1>ESTUDIOS & OUTDOOR</h1>

  <div class="subareas">

    <div class="node">
  <div class="node-liquid"></div>
</div>
<h3>Cámara</h3>
<p>Capturamos lo invisible</p>

    <div class="bubble" data-name="Iluminación"
      style="background-image:url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d')">
    </div>

    <div class="bubble" data-name="Audio"
      style="background-image:url('https://images.unsplash.com/photo-1511379938547-c1f69419868d')">
    </div>

    <div class="bubble" data-name="Switching"
      style="background-image:url('https://images.unsplash.com/photo-1581092921461-eab62e97a780')">
    </div>

  </div>
</section>
  
<section class="slide"><h1>MOC</h1></section>
<section class="slide"><h1>BOC</h1></section>
<section class="slide"><h1>GESTIÓN</h1></section>
<section class="slide"><h1>GFX</h1></section>
</div>

</div>
</div>

<script>

/* ===== FLIP ===== */
function enter(){
  document.getElementById("flip").classList.add("flipped");
}
function volver(){
  document.getElementById("flip").classList.remove("flipped");
}

/* ===== SCROLL CON INERCIA ===== */

let current = 0;
const slides = document.querySelectorAll(".slide");

let scrollForce = 0;

window.addEventListener("wheel", e=>{
  scrollForce += e.deltaY * 0.002;

  velocity += e.deltaY * 0.02; // conecta con engranaje
},{ passive:true });

function updateScroll(){
  current += scrollForce;

  scrollForce *= 0.85; // fricción

  current = Math.max(0, Math.min(current, slides.length-1));

  document.getElementById("slides").style.transform =
    `translateY(-${current * 100}vh)`;

  requestAnimationFrame(updateScroll);
}
updateScroll();

/* ===== ENGRANAJE FÍSICO ===== */

let velocity = 0;
let rotation = 0;

const gear = document.getElementById("gear");

function animateGear(){
  rotation += velocity;
  velocity *= 0.96;

  if(gear){
    gear.style.transform = `rotate(${rotation}deg)`;
  }

  requestAnimationFrame(animateGear);
}
animateGear();

/* ===== BURBUJAS ORBITALES ===== */

const bubbles = document.querySelectorAll(".bubble");

bubbles.forEach((b,i)=>{
  b.style.willChange = "transform";
  b.dataset.angle = Math.random()*360;
  b.dataset.radius = 20 + Math.random()*40;
});

function animateBubbles(){

  bubbles.forEach((b,i)=>{

    let angle = parseFloat(b.dataset.angle);
    let radius = parseFloat(b.dataset.radius);

    // velocidad depende del engranaje
    angle += velocity * 2 + 0.05;

    let x = Math.cos(angle) * radius;
    let y = Math.sin(angle) * radius;

    b.style.transform = `
  translate(${x}px, ${y}px)
  scale(${1 + Math.abs(velocity)*0.1})
`;

    // glow dinámico
    let glow = Math.min(Math.abs(velocity)*20, 40);

    b.style.boxShadow = `
      0 0 ${10+glow}px rgba(0,200,255,.6),
      0 0 ${20+glow}px rgba(255,0,200,.4)
    `;

    b.dataset.angle = angle;
  });

  requestAnimationFrame(animateBubbles);
}
animateBubbles();

/* ===== PARALLAX TÍTULOS ===== */

const titles = document.querySelectorAll(".slide h1");

function animateTitles(){
  titles.forEach((t,i)=>{
    let offset = (i - current) * 50;

    t.style.transform = `translateY(${offset}px)`;
    t.style.opacity = 1 - Math.abs(i-current)*0.5;
  });

  requestAnimationFrame(animateTitles);
}
animateTitles();

/* ===== PANEL ===== */

document.querySelectorAll(".bubble").forEach(b=>{
  b.onclick=()=>{
    document.getElementById("panel").classList.add("active");
    document.querySelector(".panel-img").style.backgroundImage=b.style.backgroundImage;
    document.getElementById("pTitle").innerText=b.dataset.name;
  }
});

function closePanel(){
  document.getElementById("panel").classList.remove("active");
}

</script>

</body>
</html>
