<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT&O Experience</title>

<style>

/* ===== BASE ===== */
body,html{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:black;
}

/* ===== FLIP ===== */
.mto-flip{
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:1s;
}
.mto-flip.flipped{ transform:rotateY(180deg); }

.mto-front,.mto-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
}
.mto-back{ transform:rotateY(180deg); }

/* ===== VIDEO ===== */
video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== OVERLAY ===== */
.mto-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.55);
  color:white;
  text-align:center;
}

.mto-overlay h1{
  font-size:2.4rem;
  letter-spacing:3px;
}

/* LOGO */
.mto-logo{
  width:320px;
  height:140px;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
  margin:20px 0;
}

/* BOTÓN */
.mto-cta{
  padding:14px 30px;
  border:1px solid white;
  border-radius:30px;
  background:transparent;
  color:white;
  cursor:pointer;
  transition:.3s;
}
.mto-cta:hover{
  background:white;
  color:black;
}

/* ===== BACK ===== */
.mto-back{ background:#000; }

/* ===== ENGRANAJE ===== */
#gearWrap{
  position:fixed;
  width:520px;
  height:520px;
  left:-120px;
  top:50%;
  transform:translateY(-50%);
  z-index:50;
}

#gear{
  width:100%;
  height:100%;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png?csf=1&web=1&e=uamKCV") center/contain no-repeat;
}

/* CENTRO */
.gear-core{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:180px;
  height:180px;
}
.gear-core-metal{
  width:100%;
  height:100%;
  border-radius:50%;
  background: radial-gradient(circle,#fff,#bbb,#444,#111);
}
.gear-logo{
  position:absolute;
  width:90px;
  height:90px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
}

/* ===== HINT ===== */
.gear-hint{
  position:absolute;
  left:50%;
  bottom:-60px;
  transform:translateX(-50%);
  color:white;
  font-size:14px;
  opacity:.7;
  animation:fadeHint 2s infinite;
}
@keyframes fadeHint{
  0%,100%{opacity:.4}
  50%{opacity:1}
}

/* ===== PROGRESO ===== */
.progress{
  position:fixed;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  z-index:60;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#555;
  transition:.3s;
}
.dot.active{
  background:#00c8ff;
  transform:scale(1.5);
}

/* ===== SLIDES ===== */
#slides{
  position:absolute;
  width:100%;
  height:100%;
  transition:transform 1s cubic-bezier(.22,1,.36,1);
}

.slide{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.content{
  max-width:800px;
}

/* FONDOS CORPORATIVOS */
.slide:nth-child(1){ background:#0b1f3a;}
.slide:nth-child(2){ background:#102a54;}
.slide:nth-child(3){ background:#1d1f4d;}
.slide:nth-child(4){ background:#153b2e;}
.slide:nth-child(5){ background:#4a1b1b;}
.slide:nth-child(6){ background:#5a2d0c;}

/* TITULOS */
h1{
  font-size:3rem;
  color:#fff;
  text-shadow:0 0 15px rgba(0,200,255,.4);
}

/* SUBAREAS */
.subareas{
  margin-top:30px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.sub{
  opacity:0;
  transform:translateY(20px);
  transition:.6s;
}

.slide.active .sub{
  opacity:1;
  transform:translateY(0);
}

  /* ===== PANEL ÁREA ===== */
#areaPanel{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.95);
  color:white;

  display:flex;
  justify-content:center;
  align-items:center;

  opacity:0;
  pointer-events:none;

  transition:.5s ease;
  z-index:999;
}

#areaPanel.active{
  opacity:1;
  pointer-events:auto;
}

.panel-content{
  max-width:900px;
  text-align:center;
  animation:panelIn .6s ease;
}

@keyframes panelIn{
  from{
    opacity:0;
    transform:translateY(40px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.close-btn{
  position:absolute;
  top:30px;
  right:40px;
  background:none;
  border:1px solid white;
  color:white;
  padding:10px;
  cursor:pointer;
}

#panelTitle{
  font-size:2.5rem;
  margin-bottom:20px;
  text-shadow:0 0 15px rgba(0,200,255,.4);
}

#panelDesc{
  font-size:1.2rem;
  opacity:.8;
  margin-bottom:30px;
}

#panelList{
  display:flex;
  flex-direction:column;
  gap:10px;
}

#areaPanel{
  position:fixed;
  inset:0;
  display:flex;
  opacity:0;
  pointer-events:none;
  transition:.6s ease;
  z-index:999;
}

#areaPanel.active{
  opacity:1;
  pointer-events:auto;
}

/* lado visual */
.panel-media{
  flex:1;
  background-size:cover;
  background-position:center;
  filter:brightness(.7);
}

/* contenido */
.panel-content{
  flex:1;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:60px;
  animation:panelIn .6s ease;
}

@keyframes panelIn{
  from{ transform:translateX(60px); opacity:0; }
  to{ transform:translateX(0); opacity:1; }
}

.close-btn{
  position:absolute;
  top:30px;
  right:40px;
  background:none;
  border:1px solid white;
  color:white;
  padding:10px;
  cursor:pointer;
}

.nav{
  position:fixed;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  z-index:70;
}

.nav div{
  width:12px;
  height:12px;
  background:#666;
  margin:10px 0;
  border-radius:50%;
  cursor:pointer;
}

</style>
</head>

<div id="areaPanel">

  <div class="panel-media"></div>

  <div class="panel-content">

    <button class="close-btn" onclick="closePanel()">✕</button>

    <h1 id="panelTitle"></h1>
    <p id="panelDesc"></p>

    <div id="panelList"></div>

  </div>

</div>

<audio id="scrollSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
  
<body>

<div class="mto-flip" id="flip">

<!-- FRONT -->
<div class="mto-front">
<video autoplay muted loop>
<source src="https://warnermedia.sharepoint.com/sites/ChileOpsWBD/SiteAssets/VIDEOS/Video%20Anfitrion%20Operaciones.mp4">
</video>

<div class="mto-overlay">
<h1>BIENVENIDOS A OPERACIONES</h1>
<div class="mto-logo"></div>
<button class="mto-cta" onclick="enter()">Conócenos</button>
</div>
</div>

<!-- BACK -->
<div class="mto-back">

<div id="gearWrap">
<div id="gear"></div>
<div class="gear-core">
<div class="gear-core-metal"></div>
<div class="gear-logo"></div>
</div>
<div class="gear-hint">Usa la rueda del mouse</div>
</div>

<div class="progress">
<div class="dot active"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

<div id="slides">

<div class="nav">
  <div onclick="goTo(0)"></div>
  <div onclick="goTo(1)"></div>
  <div onclick="goTo(2)"></div>
  <div onclick="goTo(3)"></div>
  <div onclick="goTo(4)"></div>
  <div onclick="goTo(5)"></div>
</div>  

<section class="slide" onclick="openPanel(1)">
<h1>ESTUDIOS & OUTDOOR</h1>
</section>

<section class="slide" onclick="openPanel(2)">
<h1>MOC</h1>
</section>

<section class="slide" onclick="openPanel(3)">
<h1>BOC</h1>
</section>

<section class="slide" onclick="openPanel(4)">
<h1>GESTIÓN</h1>
</section>

<section class="slide" onclick="openPanel(5)">
<h1>GFX</h1>
</section>

</div>

</div>
</div>

<script>

/* ===== CONTROL ===== */
function enter(){
  document.getElementById("flip").classList.add("flipped");
}

/* ===== SLIDES ===== */
let current=0;
const slides=document.querySelectorAll(".slide");
const dots=document.querySelectorAll(".dot");

function update(){
  document.getElementById("slides").style.transform =
    `translateY(-${current*100}vh)`;

  slides.forEach(s=>s.classList.remove("active"));
  slides[current].classList.add("active");

  dots.forEach(d=>d.classList.remove("active"));
  dots[current].classList.add("active");
}

/* ===== DATA REAL ===== */
const areasData = {

  1:{
    title:"ESTUDIOS & OUTDOOR",
    desc:"Producción en estudio y terreno",
    media:"url('https://images.unsplash.com/photo-1590608897129-79da98d15969')",
    items:["Cámaras","Iluminación","Audio"]
  },

  2:{
    title:"MOC",
    desc:"Media Operations Center",
    media:"url('https://images.unsplash.com/photo-1581091215367-59ab6b1c9f7c')",
    items:["Ingesta","Monitoreo","Control"]
  },

  3:{
    title:"BOC",
    desc:"Broadcast Operations",
    media:"url('https://images.unsplash.com/photo-1573164713988-8665fc963095')",
    items:["Continuidad","Playout"]
  }

};
  
/* ===== ABRIR PANEL ===== */
function openPanel(index){

  const data = areasData[index];
  if(!data) return;

  document.getElementById("panelTitle").innerText = data.title;
  document.getElementById("panelDesc").innerText = data.desc;

  const list = document.getElementById("panelList");
  list.innerHTML = "";

  data.items.forEach(item=>{
    const el = document.createElement("div");
    el.innerText = item;
    el.style.opacity = 0;

    setTimeout(()=>{
      el.style.opacity = 1;
      el.style.transform = "translateY(0)";
    },100);

    list.appendChild(el);
  });

  document.getElementById("areaPanel").classList.add("active");
}

/* ===== CERRAR ===== */
function closePanel(){
  document.getElementById("areaPanel").classList.remove("active");
}

/* ===== ENGRANAJE ===== */
let velocity=0;
let rotation=0;

function animate(){
  rotation+=velocity;
  velocity*=0.95;
  document.getElementById("gear").style.transform=`rotate(${rotation}deg)`;
  requestAnimationFrame(animate);
}
animate();

/* ===== SCROLL ===== */
let lock=false;

window.addEventListener("wheel", e=>{
  if(lock) return;
  lock=true;

  velocity += e.deltaY * 0.01;

  if(e.deltaY>0) current++;
  else current--;

  current=Math.max(0,Math.min(current,slides.length-1));

  update();

  setTimeout(()=>lock=false,400);

},{passive:false});

function openPanel(index){

  const data = areasData[index];
  if(!data) return;

  const panel = document.getElementById("areaPanel");

  /* 🔥 efecto zoom */
  panel.style.transform = "scale(0.9)";
  panel.classList.add("active");

  setTimeout(()=>{
    panel.style.transform = "scale(1)";
  },50);

  document.querySelector(".panel-media").style.backgroundImage = data.media;

  document.getElementById("panelTitle").innerText = data.title;
  document.getElementById("panelDesc").innerText = data.desc;

  const list = document.getElementById("panelList");
  list.innerHTML = "";

  data.items.forEach((item,i)=>{
    const el = document.createElement("div");
    el.innerText = item;
    el.style.opacity = 0;

    setTimeout(()=>{
      el.style.opacity = 1;
    }, i*120);

    list.appendChild(el);
  });
}

function closePanel(){
  const panel = document.getElementById("areaPanel");

  panel.style.transform = "scale(0.95)";

  setTimeout(()=>{
    panel.classList.remove("active");
  },200);
}

const sound = document.getElementById("scrollSound");

window.addEventListener("wheel", e=>{
  if(Math.abs(e.deltaY) > 20){
    sound.currentTime = 0;
    sound.volume = 0.15;
    sound.play();
  }
});

  function goTo(i){
  current = i;
  update();
}

</script>

</body>
</html>
