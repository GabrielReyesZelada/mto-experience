<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT&O Experience</title>

<style>

/* ===== RESET ===== */
body, html{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:black;
}

/* ===== APP ===== */
#mtoApp{
  width:100vw;
  height:100vh;
}

/* ===== STAGE ===== */
.mto-stage{
  position:relative;
  width:100%;
  height:100%;
  perspective:1200px;
}

/* ===== FLIP ===== */
.mto-flip{
  position:absolute;
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:1s;
}
.mto-flip.flipped{
  transform:rotateY(180deg);
}

/* ===== CARAS ===== */
.mto-front, .mto-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
}

.mto-back{
  transform:rotateY(180deg);
  background:#001a40;
}

/* ===== VIDEO ===== */
.mto-front video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== OVERLAY ===== */
.mto-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.5);
  color:white;
}

/* ===== TÍTULO ===== */
.mto-title{
  font-size:22px;
  letter-spacing:3px;
  margin-top:10px;
  opacity:.85;
}

/* ===== LOGO ===== */
.mto-logo{
  width:300px;
  height:120px;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
  margin:20px 0;
}

/* ===== BOTONES ===== */
.mto-cta, .mto-back-btn{
  padding:12px 28px;
  border:1px solid white;
  border-radius:30px;
  background:transparent;
  color:white;
  cursor:pointer;
}

.mto-back-btn{
  position:absolute;
  top:30px;
  right:30px;
  background:rgba(0,0,0,.3);
  backdrop-filter:blur(6px);
}

/* ===== GEAR ===== */
#gearWrap{
  position:absolute;
  width:500px;
  height:500px;
  left:-100px;
  top:50%;
  transform:translateY(-50%);
}

#gear{
  width:100%;
  height:100%;
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/SitePages/Home%20ChileOps/Gear1.png?csf=1&web=1&e=uamKCV") center/contain no-repeat;
}

/* ===== CORE ===== */
.gear-core{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:180px;
  height:180px;
}

.gear-core-metal{
  width:100%;
  height:100%;
  border-radius:50%;
  background: radial-gradient(circle,#fff,#ccc 20%,#888 50%,#333 80%,#111 100%);
}

.gear-logo{
  position:absolute;
  width:90px;
  height:90px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:url("https://warnermedia.sharepoint.com/:i:/r/sites/ChileOpsWBD/SiteAssets/LOGOS/MTO%20LOGO.png?csf=1&web=1&e=XAGkma") center/contain no-repeat;
}

/* ===== SLIDES ===== */
#mtoScript2{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.slide{
  position:absolute;
  text-align:center;
  opacity:0;
  transform:translateY(40px);
  transition:.6s;
}

.slide.active{
  opacity:1;
  transform:translateY(0);
}

/* ===== SUBÁREAS ===== */
.subareas{
  margin-top:30px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.sub{
  opacity:0;
  transform:translateY(20px);
  transition:.5s;
}

.slide.active .sub{
  opacity:1;
  transform:translateY(0);
}

.slide.active .sub:nth-child(1){transition-delay:.2s;}
.slide.active .sub:nth-child(2){transition-delay:.35s;}
.slide.active .sub:nth-child(3){transition-delay:.5s;}
.slide.active .sub:nth-child(4){transition-delay:.65s;}

</style>
</head>

<body>

<div id="mtoApp">
<div class="mto-stage">
<div class="mto-flip" id="flip">

<!-- FRONT -->
<div class="mto-front">
  <video autoplay muted loop playsinline>
    <source src="https://warnermedia.sharepoint.com/sites/ChileOpsWBD/SiteAssets/VIDEOS/Video%20Anfitrion%20Operaciones.mp4">
  </video>

  <div class="mto-overlay">
    <div class="mto-logo"></div>
    <h1 class="mto-title">MEDIA TECHNOLOGY & OPERATIONS</h1>
    <button class="mto-cta">Conócenos</button>
  </div>
</div>

<!-- BACK -->
<div class="mto-back">

<button class="mto-back-btn">← Volver</button>

<div id="gearWrap">
  <div id="gear"></div>

  <div class="gear-core">
    <div class="gear-core-metal"></div>
    <div class="gear-logo"></div>
  </div>
</div>

<div id="mtoScript2">

  <section class="slide active">
    <h1>NUESTRAS ÁREAS</h1>
  </section>

  <section class="slide">
    <h1>ESTUDIOS & OUTDOOR</h1>
    <div class="subareas">
      <div class="sub">Estudios de TV</div>
      <div class="sub">Producción en terreno</div>
      <div class="sub">Equipamiento técnico</div>
      <div class="sub">Soporte operativo</div>
    </div>
  </section>

  <section class="slide"><h1>MOC</h1></section>
  <section class="slide"><h1>BOC</h1></section>
  <section class="slide"><h1>GESTIÓN</h1></section>
  <section class="slide"><h1>GFX</h1></section>

</div>

</div>
</div>
</div>
</div>

<script>

/* ===== ELEMENTOS ===== */
const flip = document.getElementById("flip");
const enterBtn = document.querySelector(".mto-cta");
const backBtn = document.querySelector(".mto-back-btn");

let currentSlide = 0;
const slides = document.querySelectorAll(".slide");

/* ===== SLIDES ===== */
function showSlide(index){
  slides.forEach(s => s.classList.remove("active"));
  slides[index].classList.add("active");
}

function goNext(){
  currentSlide = Math.min(currentSlide + 1, slides.length - 1);
  showSlide(currentSlide);
}

function goPrev(){
  currentSlide = Math.max(currentSlide - 1, 0);
  showSlide(currentSlide);
}

/* ===== BOTONES ===== */
enterBtn.addEventListener("click", ()=>{
  flip.classList.add("flipped");
});

backBtn.addEventListener("click", ()=>{
  flip.classList.remove("flipped");
  currentSlide = 0;
  showSlide(0);
  velocity = 0;
});

/* ===== ENGRANAJE ===== */
let velocity = 0;
let rotation = 0;

function animate(){
  rotation += velocity;
  velocity *= 0.92;

  document.getElementById("gear").style.transform =
    "rotate("+rotation+"deg)";

  requestAnimationFrame(animate);
}
animate();

/* ===== SCROLL ===== */
let isScrolling = false;

window.addEventListener("wheel", (e)=>{

  const wrap = document.getElementById("gearWrap");
  const r = wrap.getBoundingClientRect();

  const inside =
    e.clientX > r.left &&
    e.clientX < r.right &&
    e.clientY > r.top &&
    e.clientY < r.bottom;

  if(!inside) return;

  e.preventDefault();

  if(isScrolling) return;
  isScrolling = true;

  if(e.deltaY > 0){
    goNext();
    velocity += 2;
  } else {
    goPrev();
    velocity -= 2;
  }

  setTimeout(()=> isScrolling = false, 700);

},{ passive:false });

</script>

</body>
</html>
